<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RCC Golf League</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f0e8; color: #1a3a2a; min-height: 100vh; overflow-x: hidden; }

  /* LOADING */
  #loadingOverlay { position: fixed; top:0;left:0;right:0;bottom:0; background:#1a3a2a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; transition:opacity 0.4s ease; }
  #loadingOverlay.hidden { opacity:0; pointer-events:none; }
  .loading-logo { font-size:28px; font-weight:800; color:#f5f0e8; margin-bottom:4px; }
  .loading-logo span { color:#c9a84c; }
  .loading-sub { font-size:11px; color:rgba(245,240,232,0.4); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:28px; }
  .spinner { width:26px; height:26px; border:2.5px solid rgba(255,255,255,0.12); border-top-color:#c9a84c; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* HEADER */
  #appHeader { background:#1a3a2a; padding:16px 16px 0 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.35); }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .league-name { font-size:22px; font-weight:800; color:#f5f0e8; }
  .league-name span { color:#c9a84c; }
  .round-badge { font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.07em; text-transform:uppercase; background:#3d7a52; color:#f5f0e8; }
  .round-badge.live::before { content:'● '; color:#ff4444; animation:pulse 1.4s infinite; }
  .round-badge.no-round { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.35); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .tabs { display:flex; gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex:1; min-width:80px; padding:11px 6px; background:transparent; border:none; border-bottom:3px solid transparent; color:rgba(255,255,255,0.45); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; transition:color 0.2s,border-color 0.2s; -webkit-appearance:none; white-space:nowrap; }
  .tab-btn.active { color:#c9a84c; border-bottom:3px solid #c9a84c; }

  /* MAIN */
  .main { max-width:700px; margin:0 auto; padding:18px 14px 90px; }

  /* SEGMENTED CONTROL */
  .segment-wrap { display:flex; background:#e8e0d0; border-radius:10px; padding:3px; margin-bottom:16px; }
  .segment-btn { flex:1; padding:8px; background:transparent; border:none; border-radius:8px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:13px; font-weight:600; color:#888; cursor:pointer; transition:all 0.18s; -webkit-appearance:none; }
  .segment-btn.active { background:#ffffff; color:#1a3a2a; box-shadow:0 1px 4px rgba(0,0,0,0.12); }
  .view { display:none; }
  .view.active { display:block; }

  /* ROUND INFO */
  .round-info { background:#2d5a3d; border-radius:12px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
  .round-course { font-size:16px; font-weight:700; color:#f5f0e8; margin-bottom:3px; }
  .round-date { font-size:12px; color:rgba(245,240,232,0.6); }
  .round-players-num { font-size:26px; font-weight:800; color:#c9a84c; line-height:1; text-align:right; }
  .round-players-lbl { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(245,240,232,0.55); text-align:right; }

  /* SCOREBOARD TABLE */
  .scoreboard-wrap { overflow-x:auto; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.14); background:#ffffff; -webkit-overflow-scrolling:touch; }
  .scoreboard-table { width:100%; min-width:540px; border-collapse:separate; border-spacing:0; font-size:13px; }
  .scoreboard-table thead { background:#1a3a2a; }
  .scoreboard-table thead th { padding:10px 7px; font-size:11px; font-weight:600; letter-spacing:0.06em; text-align:center; color:#f5f0e8; }
  .scoreboard-table thead th.name-col { text-align:left; padding-left:14px; min-width:130px; position:sticky; left:0; z-index:3; background:#1a3a2a; }
  .par-row td { background:#3d7a52; color:#f5f0e8; font-size:12px; font-weight:600; text-align:center; padding:6px 7px; border-bottom:2px solid #1a3a2a; }
  .par-row td.name-col { text-align:left; padding-left:14px; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; color:rgba(245,240,232,0.75); position:sticky; left:0; z-index:2; background:#3d7a52; box-shadow:2px 0 4px rgba(0,0,0,0.1); }
  .player-row { border-bottom:1px solid #e8e0d0; }
  .player-row:last-child { border-bottom:none; }
  .player-row td { padding:10px 7px; text-align:center; font-size:13px; }
  .player-row td.name-col { text-align:left; padding-left:14px; position:sticky; left:0; z-index:2; background:#ffffff; box-shadow:2px 0 4px rgba(0,0,0,0.06); }
  .p-name { font-size:14px; font-weight:700; color:#1a3a2a; }
  .p-hdcp { font-size:10px; color:#3d7a52; font-weight:600; }
  .p-status { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
  .p-status.active { color:#3d7a52; }
  .p-status.done { color:#bbb; }
  .pos { font-size:14px; font-weight:800; color:#c9a84c; margin-right:5px; }
  .hs { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; font-size:13px; font-weight:600; color:#1a1a1a; }
  .hs-empty  { color:#ccc; }
  .hs-birdie { border:1.5px solid #1a1a1a; border-radius:50%; }
  .hs-eagle  { border:1.5px solid #1a1a1a; border-radius:50%; outline:1.5px solid #1a1a1a; outline-offset:2px; }
  .hs-bogey  { border:1.5px solid #1a1a1a; border-radius:2px; }
  .hs-double { border:1.5px solid #1a1a1a; border-radius:2px; outline:1.5px solid #1a1a1a; outline-offset:2px; }
  .tot { font-size:14px; font-weight:800; min-width:36px; }
  .tot-under { color:#c0392b; }
  .tot-even  { color:#27ae60; }
  .tot-over  { color:#1a1a1a; }

  /* NO ROUND */
  .no-round-card { background:#ffffff; border-radius:14px; padding:48px 24px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
  .no-round-card .icon { font-size:44px; margin-bottom:14px; }
  .no-round-card h3 { font-size:20px; font-weight:700; color:#1a3a2a; margin-bottom:8px; }
  .no-round-card p { font-size:14px; color:#888; line-height:1.6; }

  /* CARDS */
  .card { background:#ffffff; border-radius:14px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,0.1); margin-bottom:16px; }
  .section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#3d7a52; font-weight:700; margin-bottom:12px; }
  .player-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .player-btn { padding:13px 10px; background:#f5f0e8; border:2px solid transparent; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; font-weight:600; color:#1a3a2a; cursor:pointer; text-align:center; position:relative; -webkit-appearance:none; transition:all 0.15s; }
  .player-btn:active { background:#e8e0d0; }
  .player-btn.selected { background:#1a3a2a; border-color:#1a3a2a; color:#f5f0e8; }
  .player-btn.has-scores::after { content:'●'; position:absolute; top:5px; right:8px; font-size:8px; color:#3d7a52; }
  .player-btn.selected.has-scores::after { color:#c9a84c; }
  .player-btn.disabled-btn { opacity:0.35; cursor:not-allowed; }
  .sub-btn { padding:13px 10px; background:transparent; border:2px solid #c9a84c; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; font-weight:700; color:#c9a84c; cursor:pointer; text-align:center; position:relative; -webkit-appearance:none; transition:all 0.15s; }
  .sub-btn:active { background:#fff8e8; }
  .sub-btn.selected { background:#c9a84c; color:#1a3a2a; }
  .sub-input-row { display:flex; gap:8px; align-items:center; margin-top:8px; grid-column:1/-1; }
  .sub-input { flex:1; padding:11px 12px; border:2px solid #c9a84c; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; background:#fffdf5; color:#1a3a2a; outline:none; -webkit-appearance:none; }
  .sub-input:focus { border-color:#b8923e; }
  .sub-add-btn { padding:11px 16px; background:#c9a84c; color:#1a3a2a; border:none; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; font-weight:700; cursor:pointer; -webkit-appearance:none; white-space:nowrap; }
  .sub-add-btn:active { background:#b8923e; }
  .sub-tag { display:inline-flex; align-items:center; gap:6px; background:#fff8e8; border:1.5px solid #c9a84c; border-radius:20px; padding:5px 10px 5px 12px; font-size:13px; font-weight:600; color:#1a3a2a; margin:4px 4px 0 0; }
  .sub-tag-remove { background:none; border:none; color:#c9a84c; font-size:16px; cursor:pointer; padding:0; line-height:1; font-weight:700; }
  .sub-tags-wrap { grid-column:1/-1; display:flex; flex-wrap:wrap; margin-top:4px; min-height:0; }
  .start-group-btn { width:100%; padding:14px; background:#c9a84c; color:#1a3a2a; border:none; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:16px; font-weight:800; cursor:pointer; -webkit-appearance:none; margin-top:4px; transition:background 0.15s; }
  .start-group-btn:active { background:#b8923e; }
  .start-group-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .group-hint { font-size:12px; color:#aaa; text-align:center; margin-top:8px; }

  /* GROUP SCORECARD */
  .scorecard-header { background:#1a3a2a; border-radius:12px 12px 0 0; padding:14px 16px 12px; display:flex; align-items:center; justify-content:space-between; }
  .sc-title { font-size:18px; font-weight:800; color:#f5f0e8; }
  .sc-date { font-size:12px; color:rgba(245,240,232,0.55); margin-top:2px; }
  .sc-close-btn { background:rgba(255,255,255,0.12); border:none; color:#f5f0e8; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; -webkit-appearance:none; }
  .scorecard-wrap { overflow-x:auto; background:#ffffff; border-radius:0 0 12px 12px; box-shadow:0 4px 20px rgba(0,0,0,0.14); margin-bottom:16px; -webkit-overflow-scrolling:touch; }
  .sc-table { border-collapse:separate; border-spacing:0; font-size:13px; width:100%; }
  .sc-table .col-label { min-width:90px; width:90px; }
  .sc-table .col-hole  { min-width:38px; width:38px; }
  .sc-table .col-tot   { min-width:50px; width:50px; }
  .sc-table td.lbl-cell, .sc-table th.lbl-cell { position:sticky; left:0; z-index:2; }
  .sc-table .row-holes th { background:#1a3a2a; color:#f5f0e8; text-align:center; padding:8px 4px; font-size:12px; font-weight:700; letter-spacing:0.04em; border-right:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:1; }
  .sc-table .row-holes th.lbl-cell { text-align:left; padding-left:10px; z-index:3; }
  .sc-table .row-holes th.tot-cell { background:#0f2419; }
  .sc-table .row-yards td { text-align:center; padding:5px 4px; font-size:11px; font-weight:600; border-right:1px solid #e8e0d0; border-bottom:1px solid #e8e0d0; }
  .sc-table .row-yards td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; font-weight:700; }
  .sc-table .row-yards.blue-row td { background:#ddeeff; color:#1a5fa8; }
  .sc-table .row-yards.blue-row td.lbl-cell { background:#1a5fa8; color:#fff; }
  .sc-table .row-yards.white-row td { background:#f9f9f9; color:#333; }
  .sc-table .row-yards.white-row td.lbl-cell { background:#555; color:#fff; }
  .sc-table .row-par td { background:#2d5a3d; color:#f5f0e8; text-align:center; padding:6px 4px; font-size:13px; font-weight:700; border-right:1px solid rgba(255,255,255,0.15); border-bottom:2px solid #1a3a2a; }
  .sc-table .row-par td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; background:#2d5a3d; }
  .sc-table .row-par td.tot-cell { background:#1a3a2a; }
  .sc-table .row-hdcp td { background:#f0ebe0; color:#666; text-align:center; padding:5px 4px; font-size:11px; font-weight:600; border-right:1px solid #e8e0d0; border-bottom:2px solid #1a3a2a; }
  .sc-table .row-hdcp td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#888; background:#f0ebe0; }
  .sc-table .row-hdcp td.tot-cell { background:#e8e0d0; }
  .sc-table .row-player td { text-align:center; padding:4px 3px; border-right:1px solid #e8e0d0; border-bottom:1px solid #e8e0d0; }
  .sc-table .row-player:last-child td { border-bottom:none; }
  .sc-table .row-player td.lbl-cell { text-align:left; padding-left:10px; background:#fafaf8; font-size:13px; font-weight:700; color:#1a3a2a; white-space:nowrap; box-shadow:2px 0 4px rgba(0,0,0,0.06); }
  .sc-table .row-player td.tot-cell { background:#f5f0e8; font-size:13px; font-weight:800; }
  .score-cell-btn { width:30px; height:28px; border-radius:6px; border:1.5px solid #e8e0d0; background:#ffffff; font-size:13px; font-weight:600; color:#1a1a1a; cursor:pointer; -webkit-appearance:none; display:inline-flex; align-items:center; justify-content:center; transition:all 0.12s; }
  .score-cell-btn:active { transform:scale(0.92); }
  .score-cell-btn.empty { color:#ccc; border-color:#eee; }
  .score-cell-btn.under { background:rgba(192,57,43,0.1); color:#c0392b; border-color:rgba(192,57,43,0.25); font-weight:700; }
  .score-cell-btn.even  { background:rgba(39,174,96,0.1);  color:#27ae60; border-color:rgba(39,174,96,0.25);  font-weight:700; }
  .score-cell-btn.over  { background:#f5f5f5; color:#1a1a1a; border-color:#ddd; }
  .player-tot { font-size:13px; font-weight:800; }
  .player-tot .vtp { font-size:11px; font-weight:700; display:block; margin-top:1px; }
  .vtp-under { color:#c0392b; }
  .vtp-even  { color:#27ae60; }
  .vtp-over  { color:#1a1a1a; }
  .finish-bar { background:#ffffff; border-radius:12px; padding:14px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .finish-bar-info { font-size:13px; color:#888; }
  .finish-bar-info strong { color:#1a3a2a; font-size:14px; display:block; margin-bottom:2px; }
  .btn-finish-group { padding:12px 20px; background:#1a3a2a; color:#f5f0e8; border:none; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; font-weight:700; cursor:pointer; -webkit-appearance:none; white-space:nowrap; }
  .btn-finish-group:active { background:#2d5a3d; }

  /* SCORE POPOVER */
  .popover-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .popover-overlay.open { opacity:1; pointer-events:all; }
  .popover { background:#ffffff; border-radius:20px 20px 0 0; padding:20px 20px 36px; width:100%; max-width:400px; transform:translateY(100%); transition:transform 0.25s ease; }
  .popover-overlay.open .popover { transform:translateY(0); }
  .pop-title { font-size:13px; color:#888; text-align:center; margin-bottom:2px; }
  .pop-sub { font-size:18px; font-weight:800; color:#1a3a2a; text-align:center; margin-bottom:16px; }
  .pop-par { font-size:12px; color:#3d7a52; font-weight:600; text-align:center; margin-top:-12px; margin-bottom:16px; }
  .pop-controls { display:flex; align-items:center; justify-content:center; gap:24px; margin-bottom:16px; }
  .pop-btn { width:56px; height:56px; border-radius:50%; border:2px solid #2d5a3d; background:transparent; font-size:28px; color:#2d5a3d; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-appearance:none; font-weight:300; }
  .pop-btn:active { background:#1a3a2a; border-color:#1a3a2a; color:#fff; }
  .pop-val { font-size:60px; font-weight:800; color:#1a3a2a; min-width:72px; text-align:center; line-height:1; }
  .pop-label { text-align:center; font-size:14px; font-weight:600; min-height:20px; margin-bottom:16px; }
  .pop-label.under { color:#c0392b; }
  .pop-label.even  { color:#27ae60; }
  .pop-label.over  { color:#1a1a1a; }
  .pop-actions { display:flex; gap:10px; }
  .pop-cancel { padding:13px 18px; background:transparent; color:#1a3a2a; border:2px solid #e8e0d0; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:15px; font-weight:600; cursor:pointer; -webkit-appearance:none; }
  .pop-save { flex:1; padding:13px; background:#1a3a2a; color:#f5f0e8; border:none; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:15px; font-weight:700; cursor:pointer; -webkit-appearance:none; }
  .pop-save:active { background:#2d5a3d; }
  .pop-clear { padding:13px 14px; background:transparent; color:#c0392b; border:2px solid #c0392b; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:13px; font-weight:600; cursor:pointer; -webkit-appearance:none; }

  /* ── MATCHUP SCORES TAB ── */
  .mx-card {
    background:#ffffff; border-radius:14px; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.12); margin-bottom:20px;
  }
  .mx-header {
    background:#1a3a2a; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .mx-header-title { font-size:13px; font-weight:700; color:#c9a84c; letter-spacing:0.06em; text-transform:uppercase; }
  .mx-hdcp-badge { font-size:11px; color:rgba(245,240,232,0.6); }
  .mx-teams { display:grid; grid-template-columns:1fr auto 1fr; align-items:start; padding:14px 16px 10px; gap:8px; }
  .mx-team-name { font-size:13px; font-weight:700; color:#1a3a2a; line-height:1.4; }
  .mx-team-hdcp { font-size:11px; color:#888; margin-top:2px; }
  .mx-team-pts { font-size:28px; font-weight:800; color:#1a3a2a; text-align:center; line-height:1; }
  .mx-team-pts-lbl { font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:#aaa; text-align:center; margin-top:2px; }
  .mx-vs { font-size:11px; font-weight:800; color:#c9a84c; padding-top:4px; text-align:center; }
  .mx-team-right { text-align:right; }

  /* Matchup scoring grid */
  .mx-grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-top:1px solid #f0ebe0; }
  .mx-grid { width:100%; border-collapse:separate; border-spacing:0; font-size:12px; min-width:420px; }
  .mx-grid th { background:#2d5a3d; color:#f5f0e8; text-align:center; padding:6px 4px; font-size:11px; font-weight:700; border-right:1px solid rgba(255,255,255,0.1); }
  .mx-grid th.lbl-th { text-align:left; padding-left:10px; min-width:80px; position:sticky; left:0; z-index:2; background:#2d5a3d; }
  .mx-grid td { text-align:center; padding:5px 3px; border-right:1px solid #f0ebe0; border-bottom:1px solid #f0ebe0; font-size:12px; }
  .mx-grid td.lbl-td { text-align:left; padding-left:10px; font-size:12px; font-weight:700; color:#1a3a2a; background:#fafaf8; position:sticky; left:0; z-index:1; box-shadow:2px 0 4px rgba(0,0,0,0.04); white-space:nowrap; }
  .mx-grid .stroke-hole { background:#fffbf0; }
  .mx-grid .stroke-indicator { font-size:9px; color:#c9a84c; display:block; line-height:1; margin-top:1px; }

  /* Point cells */

// ── HANDICAP CALCULATION ──────────────────────────────────────────────────────
// Uses current season rounds only.
// Min 3 rounds required (TBD otherwise).
// 3 rounds: lowest 3 scores → avg → (avg - 36) * 0.8 → round
// 4+ rounds: lowest 4 of last 8 → avg → (avg - 36) * 0.8 → round

function calcHandicap(playerId) {
  // If admin override exists, use it
  if (handicapOverrides[playerId] !== undefined && handicapOverrides[playerId] !== null) {
    return { value: handicapOverrides[playerId], source: 'override' };
  }
  const scores = seasonScoreHistory[playerId] || [];
  if (scores.length < 3) return { value: null, source: 'tbd', rounds: scores.length };

  let pool;
  if (scores.length < 4) {
    // Only 3 rounds — use lowest 3
    pool = [...scores].sort((a,b)=>a-b).slice(0,3);
  } else {
    // 4+ rounds — lowest 4 of last 8
    const last8 = scores.slice(-8);
    pool = [...last8].sort((a,b)=>a-b).slice(0,4);
  }
  const avg = pool.reduce((a,b)=>a+b,0) / pool.length;
  const raw = (avg - PAR_9) * 0.8;
  const value = Math.round(raw);
  return { value: Math.max(0, value), source: 'calculated', avg, pool };
}

function getEffectiveHandicap(playerId) {
  const hc = calcHandicap(playerId);
  return hc.value ?? 0;
}

// Get stroke holes for a matchup: returns map of holeIdx → strokes given
// Handles diff > 9 by wrapping: e.g. diff=12 → all 9 holes get 1 stroke, 3 hardest get 2
function getStrokeHoles(teamAHdcp, teamBHdcp, courseName) {
  const diff = Math.abs(teamAHdcp - teamBHdcp);
  if (diff === 0) return { weakerIsA: false, strokeHoles: [], strokeMap: {} };
  const weakerIsA = teamAHdcp > teamBHdcp;
  const cd = COURSE_DATA[courseName];
  if (!cd) return { weakerIsA, strokeHoles: [], strokeMap: {} };

  // Sort holes by difficulty (hdcp 1 = hardest)
  const holesSorted = cd.hdcp
    .map((h,i) => ({ holeIdx: i, difficulty: h }))
    .sort((a,b) => a.difficulty - b.difficulty);

  // Build stroke map: each hole gets floor(diff/9) strokes minimum
  // Then the remainder goes to the hardest holes
  const base = Math.floor(diff / 9);
  const remainder = diff % 9;
  const strokeMap = {};
  holesSorted.forEach((h, rank) => {
    const extra = rank < remainder ? 1 : 0;
    strokeMap[h.holeIdx] = base + extra;
  });

  // strokeHoles = any hole that gets at least 1 stroke
  const strokeHoles = Object.keys(strokeMap).map(Number).filter(idx => strokeMap[idx] > 0);
  return { weakerIsA, strokeHoles, strokeMap };
}

async function loadSeasonScoreHistory() {
  if (!activeSeason) return;
  // Get all closed + active rounds for this season ordered by date
  const { data: allRounds } = await sb.from('rounds')
    .select('id, date')
    .eq('season_id', activeSeason.id)
    .in('status', ['active','closed'])
    .order('date', { ascending: true });

  if (!allRounds || allRounds.length === 0) { seasonScoreHistory = {}; return; }

  const roundIds = allRounds.map(r => r.id);
  const { data: allScores } = await sb.from('scores')
    .select('player_id, hole, strokes, round_id')
    .in('round_id', roundIds);

  // Build per-player round totals ordered by round date
  const roundOrder = {};
  allRounds.forEach((r,i) => roundOrder[r.id] = i);

  // Group scores by player+round
  const byPlayerRound = {};
  (allScores||[]).forEach(s => {
    const key = `${s.player_id}__${s.round_id}`;
    if (!byPlayerRound[key]) byPlayerRound[key] = { playerId: s.player_id, roundId: s.round_id, holes: {} };
    byPlayerRound[key].holes[s.hole] = s.strokes;
  });

  // Only count rounds where all 9 holes are entered
  const seasonTotals = {}; // { playerId: [{roundIdx, total}] }
  Object.values(byPlayerRound).forEach(({ playerId, roundId, holes }) => {
    const holeNums = Object.keys(holes).map(Number);
    if (holeNums.length < 9) return; // incomplete round
    const total = Object.values(holes).reduce((a,b)=>a+b,0);
    if (!seasonTotals[playerId]) seasonTotals[playerId] = [];
    seasonTotals[playerId].push({ roundIdx: roundOrder[roundId], total });
  });

  // Sort by round order and extract totals
  seasonScoreHistory = {};
  Object.entries(seasonTotals).forEach(([pid, rounds]) => {
    rounds.sort((a,b)=>a.roundIdx-b.roundIdx);
    seasonScoreHistory[pid] = rounds.map(r=>r.total);
  });
}

async function loadAllRounds() {

  allActiveRounds = active || [];

  const { data: closed } = await sb.from('rounds')
    .select('*, courses(*)')

    .order('date', { ascending: false });
  closedRounds = closed || [];

  const displayId = activeSeason.display_round_id;
  if (displayId) {
    const found = allActiveRounds.find(r=>r.id===displayId);
    if (found) { activeRound=found; activeCourse=found.courses; }
    else { activeRound=null; activeCourse=null; }
  } else { activeRound=null; activeCourse=null; }

  await loadScores();
}

async function loadScores() {
  if (!activeRound) { scoreMap={}; matchups=[]; return; }
  const { data } = await sb.from('scores').select('*').eq('round_id',activeRound.id);
  scoreMap = {};
  (data||[]).forEach(s => {
    if (!scoreMap[s.player_id]) scoreMap[s.player_id]={};
    scoreMap[s.player_id][s.hole] = s.strokes;
  });
  const { data: mx } = await sb.from('matchups').select('*').eq('round_id',activeRound.id).order('created_at');
  const seen = new Set();
  matchups = (mx||[]).filter(m => { if(seen.has(m.id)) return false; seen.add(m.id); return true; });
  if (groupMode && selectedGroup.length>0) {
    selectedGroup.forEach(pid => {
      if (pid.startsWith('sub_')) return;
      groupScores[pid] = { ...(scoreMap[pid]||{}) };
    });
  }
}

function subscribeRealtime() {
  sb.channel('rcc-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'scores'}, async()=>{
      await loadScores();
      await loadSeasonScoreHistory();
      renderScoreboard();
      renderMatchupScores();
      if (groupMode) renderGroupScorecard();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'rounds'}, async()=>{
      await reloadRound();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'handicaps'}, async()=>{
      await loadHandicapOverrides();
      renderAll();
    })
    .subscribe();
}

async function reloadRound() {
  if (!activeSeason) return;
  const { data: seasons } = await sb.from('seasons').select('*').eq('id',activeSeason.id).limit(1);
  if (seasons?.[0]) activeSeason = seasons[0];
  await loadAllRounds();
  await loadSeasonScoreHistory();
  updateBadge(); renderAll();
}

function updateBadge() {
  const b = document.getElementById('roundBadge');
  if (activeRound) { b.textContent='Live'; b.className='round-badge live'; }
  else if (allActiveRounds.length>0) { b.textContent='No Display'; b.className='round-badge no-round'; }
  else { b.textContent='No Round'; b.className='round-badge no-round'; }
}

function renderAll() { renderScoreboard(); renderMatchupScores(); renderEntry(); renderAdmin(); }

// ── SCOREBOARD ────────────────────────────────────────────────────────────────
function renderScoreboard() {
  const el = document.getElementById('scoreboardContent');
  if (!activeRound||!activeCourse) {
    el.innerHTML=`<div class="no-round-card"><div class="icon">⛳</div><h3>No Active Round</h3><p>Head to the Admin tab to start this week's round.</p></div>`;
    return;
  }
  const subPlayers = subs.filter(s=>s.fromDb).map(s=>({id:s.id,name:s.name}));
  const allPlayers = [...players, ...subPlayers.filter(s=>!players.some(p=>p.id===s.id))];
  const withScores = allPlayers.filter(p=>scoreMap[p.id]&&Object.keys(scoreMap[p.id]).length>0);
  const rows = withScores.map(p=>{
    const holes=scoreMap[p.id]||{};
    const arr=pars().map((_,i)=>holes[i+1]??null);
    const played=arr.filter(s=>s!==null);
    const strokes=played.reduce((a,b)=>a+b,0);
    const parPlayed=pars().slice(0,played.length).reduce((a,b)=>a+b,0);
    const diff=played.length>0?strokes-parPlayed:null;
    return{p,arr,played,strokes,diff};
  }).sort((a,b)=>{
    if(a.diff===null&&b.diff===null)return 0;
    if(a.diff===null)return 1; if(b.diff===null)return -1;
    if(a.diff!==b.diff)return a.diff-b.diff;
    return b.played.length-a.played.length;
  });

  let parCells=`<tr class="par-row"><td class="name-col">Par</td>`;
  pars().forEach(p=>parCells+=`<td>${p}</td>`);
  parCells+=`<td>${totalPar()}</td><td>—</td></tr>`;

  let body='';
  if(rows.length===0){
    body=`<tr><td colspan="12"><div class="empty-state"><div class="ei">⛳</div><p>No scores yet.</p></div></td></tr>`;
  } else {
    rows.forEach((row,i)=>{
      const hp=row.played.length;
      const stTxt=hp===9?'F':hp>0?`Thru ${hp}`:'—';
      const stCls=hp===9?'done':hp>0?'active':'';
      const hc = calcHandicap(row.p.id);
      const hdcpTxt = hc.source==='tbd' ? 'TBD' : `HCP ${hc.value}${hc.source==='override'?' ✎':''}`;
      let cells='';
      for(let h=0;h<9;h++){
        const s=row.arr[h];
        if(s===null){ cells+=`<td><span class="hs hs-empty">·</span></td>`; }
        else {
          const d=s-pars()[h];
          let hsCls='hs';
          if(d<=-2) hsCls+=' hs-eagle';
          else if(d===-1) hsCls+=' hs-birdie';
          else if(d===1) hsCls+=' hs-bogey';
          else if(d>=2) hsCls+=' hs-double';
          cells+=`<td><span class="${hsCls}">${s}</span></td>`;
        }
      }
      const tot=hp>0?row.strokes:'—';
      const diff=row.diff!==null?vtpLabel(row.diff):'—';
      const dc=row.diff!==null?`tot-${vtpClass(row.diff)}`:'';
      body+=`<tr class="player-row">
        <td class="name-col">
          <div><span class="pos">${i+1}</span><span class="p-name">${row.p.name}</span></div>
          <div class="p-hdcp">${hdcpTxt}</div>
          <div class="p-status ${stCls}">${stTxt}</div>
        </td>
        ${cells}<td class="tot">${tot}</td><td class="tot ${dc}">${diff}</td>
      </tr>`;
    });
  }
  el.innerHTML=`
    <div class="round-info">
      <div><div class="round-course">Boulder Pointe — ${activeCourse.name}</div><div class="round-date">${fmtDate(activeRound.date)}</div></div>
      <div><div class="round-players-num">${withScores.length}</div><div class="round-players-lbl">Playing</div></div>
    </div>
    <div class="scoreboard-wrap">
      <table class="scoreboard-table">
        <thead><tr>
          <th class="name-col">#&nbsp; Player</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
          <th>TOT</th><th>+/-</th>
        </tr></thead>
        <tbody>${parCells}</tbody><tbody>${body}</tbody>
      </table>
    </div>`;
}

// ── MATCHUP SCORES ─────────────────────────────────────────────────────────────
function renderMatchupScores() {
  const el = document.getElementById('matchupsContent');
  if (!activeRound || !activeCourse) {
    el.innerHTML=`<div class="no-round-card"><div class="icon">🏆</div><h3>No Active Round</h3><p>Head to the Admin tab to start this week's round.</p></div>`;
    return;
  }
  if (matchups.length === 0) {
    el.innerHTML=`
      <div class="round-info">
        <div><div class="round-course">Boulder Pointe — ${activeCourse.name}</div><div class="round-date">${fmtDate(activeRound.date)}</div></div>
      </div>
      <div class="no-round-card"><div class="icon">📋</div><h3>No Matchups Set</h3><p>An admin needs to set the matchups for this round.</p></div>`;
    return;
  }

  const cd = courseData();
  if (!cd) return;

  let html = `
    <div class="round-info">
      <div><div class="round-course">Boulder Pointe — ${activeCourse.name}</div><div class="round-date">${fmtDate(activeRound.date)}</div></div>
    </div>`;

  matchups.forEach((m, idx) => {
    html += renderMatchupCard(m, idx, cd);
  });

  el.innerHTML = html;
}

function renderMatchupCard(m, idx, cd) {
  const t1display = getTeamDisplay(m.team1_id, m.id, 1);
  const t2display = getTeamDisplay(m.team2_id, m.id, 2);

  // Get handicaps for each player
  const t1p1hc = getEffectiveHandicap(t1display.pids[0]);
  const t1p2hc = getEffectiveHandicap(t1display.pids[1]);
  const t2p1hc = getEffectiveHandicap(t2display.pids[0]);
  const t2p2hc = getEffectiveHandicap(t2display.pids[1]);

  const team1Hdcp = t1p1hc + t1p2hc;
  const team2Hdcp = t2p1hc + t2p2hc;
  const hdcpDiff  = Math.abs(team1Hdcp - team2Hdcp);

  // Determine which team gets strokes and on which holes
  const { weakerIsA: weakerIsTeam1, strokeHoles, strokeMap } = getStrokeHoles(team1Hdcp, team2Hdcp, activeCourse.name);

  // Get scores for all 4 players
  const t1p1scores = scoreMap[t1display.pids[0]] || {};
  const t1p2scores = scoreMap[t1display.pids[1]] || {};
  const t2p1scores = scoreMap[t2display.pids[0]] || {};
  const t2p2scores = scoreMap[t2display.pids[1]] || {};

  // Also check groupScores for in-progress subs
  const getScore = (pid, hole) => {
    return (scoreMap[pid]||{})[hole] ?? (groupScores[pid]||{})[hole] ?? null;
  };

  // Build hole-by-hole scoring
  let team1HolePts = 0, team2HolePts = 0;
  let team1TotalStrokes = 0, team2TotalStrokes = 0;
  let team1HolesPlayed = 0, team2HolesPlayed = 0;
  const holeResults = []; // { h, t1Combined, t2Combined, t1Net, t2Net, strokeTeam, t1pts, t2pts, hasData }

  for (let h = 1; h <= 9; h++) {
    const hIdx = h - 1;
    const t1s1 = getScore(t1display.pids[0], h);
    const t1s2 = getScore(t1display.pids[1], h);
    const t2s1 = getScore(t2display.pids[0], h);
    const t2s2 = getScore(t2display.pids[1], h);

    const t1both = t1s1 !== null && t1s2 !== null;
    const t2both = t2s1 !== null && t2s2 !== null;
    const hasData = t1both || t2both;
    const bothTeamsHaveData = t1both && t2both;

    const t1Combined = t1both ? t1s1 + t1s2 : null;
    const t2Combined = t2both ? t2s1 + t2s2 : null;

    // Stroke adjustment — weaker team gets -1 on stroke holes
    const isStrokeHole = strokeHoles.includes(hIdx);
    let t1Net = t1Combined;
    let t2Net = t2Combined;
    if (isStrokeHole) {
      if (weakerIsTeam1 && t1Net !== null) t1Net -= (strokeMap[hIdx] || 0);
      else if (!weakerIsTeam1 && t2Net !== null) t2Net -= (strokeMap[hIdx] || 0);
    }

    let t1pts = null, t2pts = null;
    if (bothTeamsHaveData) {
      if (t1Net < t2Net)       { t1pts = 2; t2pts = 0; }
      else if (t1Net === t2Net) { t1pts = 1; t2pts = 1; }
      else                      { t1pts = 0; t2pts = 2; }
      team1HolePts += t1pts;
      team2HolePts += t2pts;
    }

    if (t1both) { team1TotalStrokes += t1Combined; team1HolesPlayed++; }
    if (t2both) { team2TotalStrokes += t2Combined; team2HolesPlayed++; }

    holeResults.push({ h, hIdx, t1Combined, t2Combined, t1Net, t2Net, isStrokeHole, t1pts, t2pts, hasData, bothTeamsHaveData, weakerIsTeam1 });
  }

  // Totals points — compare net totals (strokes applied)
  // Net total = sum of all holes after applying stroke adjustments
  const t1NetTotal = holeResults
    .filter(r => r.t1Combined !== null)
    .reduce((sum, r) => sum + (r.isStrokeHole && weakerIsTeam1 ? r.t1Combined - (strokeMap[r.hIdx]||0) : r.t1Combined), 0);
  const t2NetTotal = holeResults
    .filter(r => r.t2Combined !== null)
    .reduce((sum, r) => sum + (r.isStrokeHole && !weakerIsTeam1 ? r.t2Combined - (strokeMap[r.hIdx]||0) : r.t2Combined), 0);

  // Only award totals pts if both teams have at least 9 holes complete
  let team1TotalsPts = 0, team2TotalsPts = 0;
  const bothComplete = team1HolesPlayed === 9 && team2HolesPlayed === 9;
  if (bothComplete) {
    if (t1NetTotal < t2NetTotal)       { team1TotalsPts = 4; team2TotalsPts = 0; }
    else if (t1NetTotal === t2NetTotal) { team1TotalsPts = 2; team2TotalsPts = 2; }
    else                                { team1TotalsPts = 0; team2TotalsPts = 4; }
  }

  const team1Final = team1HolePts + team1TotalsPts;
  const team2Final = team2HolePts + team2TotalsPts;

  // Build header cells
  let hdrCells = `<th class="lbl-th">TEAM</th>`;
  for (let h = 1; h <= 9; h++) {
    const isStroke = strokeHoles.includes(h-1);
    hdrCells += `<th${isStroke?' style="background:#2a5038;"':''}>${h}${isStroke?'<span class="stroke-indicator">▲</span>':''}</th>`;
  }
  hdrCells += `<th style="background:#0f2419;">PTS</th>`;

  // Build team 1 row
  let t1cells = `<td class="lbl-td">${t1display.playerNames}</td>`;
  holeResults.forEach(r => {
    const isStroke = r.isStrokeHole;
    const cellCls = isStroke ? ' stroke-hole' : '';
    if (r.t1Combined === null) {
      t1cells += `<td class="${cellCls}"><span class="mx-score-empty">—</span></td>`;
    } else {
      const netNote = (isStroke && weakerIsTeam1) ? `<span class="mx-score-net">${r.t1Net} net</span>` : '';
      t1cells += `<td class="${cellCls}"><span class="mx-score">${r.t1Combined}</span>${netNote}</td>`;
    }
  });
  const t1totCls = bothComplete ? (team1TotalsPts > team2TotalsPts ? 'pt-win' : team1TotalsPts === team2TotalsPts ? 'pt-tie' : 'pt-loss') : 'pt-empty';
  t1cells += `<td><span class="pt-cell ${bothComplete ? t1totCls : 'pt-empty'}">${bothComplete ? team1TotalsPts : '—'}</span></td>`;

  // Build team 2 row
  let t2cells = `<td class="lbl-td">${t2display.playerNames}</td>`;
  holeResults.forEach(r => {
    const isStroke = r.isStrokeHole;
    const cellCls = isStroke ? ' stroke-hole' : '';
    if (r.t2Combined === null) {
      t2cells += `<td class="${cellCls}"><span class="mx-score-empty">—</span></td>`;
    } else {
      const netNote = (isStroke && !weakerIsTeam1) ? `<span class="mx-score-net">${r.t2Net} net</span>` : '';
      t2cells += `<td class="${cellCls}"><span class="mx-score">${r.t2Combined}</span>${netNote}</td>`;
    }
  });
  const t2totCls = bothComplete ? (team2TotalsPts > team1TotalsPts ? 'pt-win' : team1TotalsPts === team2TotalsPts ? 'pt-tie' : 'pt-loss') : 'pt-empty';
  t2cells += `<td><span class="pt-cell ${bothComplete ? t2totCls : 'pt-empty'}">${bothComplete ? team2TotalsPts : '—'}</span></td>`;

  // Totals row
  let totRow = `<td class="lbl-td">NET TOT</td>`;
  for (let h = 1; h <= 9; h++) totRow += `<td>—</td>`;

  // Winner display
  const t1isWinner = team1Final > team2Final;
  const t2isWinner = team2Final > team1Final;
  const anyFinal = bothComplete || team1HolePts > 0 || team2HolePts > 0;

  // Stroke legend
  const strokeLegend = hdcpDiff > 0
    ? `▲ = stroke hole (${weakerIsTeam1 ? t1display.teamLabel : t2display.teamLabel} gets -1 on ${hdcpDiff} hardest hole${hdcpDiff>1?'s':''})`
    : 'No handicap strokes (equal combined handicaps)';

  // Net totals for display
  const t1NetDisp = team1HolesPlayed > 0 ? t1NetTotal : '—';
  const t2NetDisp = team2HolesPlayed > 0 ? t2NetTotal : '—';

  return `
    <div class="mx-card">
      <div class="mx-header">
        <div class="mx-header-title">Matchup ${idx + 1}</div>
        <div class="mx-hdcp-badge">
          HCP: ${team1Hdcp} vs ${team2Hdcp}${hdcpDiff > 0 ? ` (${hdcpDiff} stroke${hdcpDiff>1?'s':''})` : ' (even)'}
        </div>
      </div>

      <div class="mx-teams">
        <div>
          <div class="mx-team-name">${t1display.playerNames.replace('<br>','<br>')}</div>
          <div class="mx-team-hdcp">Team ${getTeamNumber(m.team1_id)} · Combined HCP ${team1Hdcp}</div>
        </div>
        <div class="mx-vs">vs</div>
        <div class="mx-team-right">
          <div class="mx-team-name">${t2display.playerNames.replace('<br>','<br>')}</div>
          <div class="mx-team-hdcp" style="text-align:right;">Team ${getTeamNumber(m.team2_id)} · Combined HCP ${team2Hdcp}</div>
        </div>
      </div>

      <div class="mx-grid-wrap">
        <table class="mx-grid">
          <thead><tr>${hdrCells}</tr></thead>
          <tbody>
            <tr>${t1cells}</tr>
            <tr>${t2cells}</tr>

          </tbody>
        </table>
      </div>

      <div class="mx-final">
        <div>
          <div class="mx-final-pts ${t1isWinner ? 'winner' : ''}">${anyFinal ? team1Final : '—'}</div>
          <span class="mx-final-lbl">
            Hole: ${team1HolePts} + Tot: ${bothComplete ? team1TotalsPts : '—'}
          </span>
        </div>
        <div class="mx-final-vs">FINAL PTS</div>
        <div class="mx-final-pts-right">
          <div class="mx-final-pts ${t2isWinner ? 'winner' : ''}">${anyFinal ? team2Final : '—'}</div>
          <span class="mx-final-lbl" style="text-align:right;display:block;">
            Hole: ${team2HolePts} + Tot: ${bothComplete ? team2TotalsPts : '—'}
          </span>
        </div>
      </div>

      <div style="padding:8px 16px 10px;font-size:10px;color:#aaa;border-top:1px solid #f0ebe0;">
        ${strokeLegend}
      </div>
    </div>`;
}

// ── ENTRY ─────────────────────────────────────────────────────────────────────
function renderEntry() {
  const el = document.getElementById('entryContent');
  if (!activeRound||!activeCourse) {
    el.innerHTML=`<div class="no-round-card"><div class="icon">✏️</div><h3>No Active Round</h3><p>An admin needs to start this week's round first.</p></div>`;
    groupMode=false; selectedGroup=[];
    return;
  }
  if (groupMode) { renderGroupScorecard(); return; }
  if (matchups.length>0) { renderMatchupList(); return; }
  renderPlayerSelect();
}

function renderMatchupList() {
  const el = document.getElementById('entryContent');
  const cards = matchups.map((m,i) => {
    const t1 = getTeamDisplay(m.team1_id, m.id, 1);
    const t2 = getTeamDisplay(m.team2_id, m.id, 2);
    const allPids = [...t1.pids, ...t2.pids];
    const progress = allPids.map(pid => {
      const holes = scoreMap[pid]||{};
      const count = Object.keys(holes).length;
      const p = allSelectablePlayers().find(x=>x.id===pid);
      const name = p ? p.name.split(' ')[0] : '?';
      return `<span class="${count>0?'has-score':''}">${name}: ${count}/9</span>`;
    }).join('');
    return `<div class="matchup-card" onclick="selectMatchup('${m.id}')">
      <div class="matchup-card-header">Matchup ${i+1}</div>
      <div class="matchup-teams">
        <div class="matchup-team">
          <div class="matchup-team-num">Team ${getTeamNumber(m.team1_id)}</div>
          <div class="matchup-team-players">${t1.names}</div>
        </div>
        <div class="matchup-vs">vs</div>
        <div class="matchup-team">
          <div class="matchup-team-num">Team ${getTeamNumber(m.team2_id)}</div>
          <div class="matchup-team-players">${t2.names}</div>
        </div>
      </div>
      <div class="matchup-progress">${progress}</div>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="round-info">
      <div><div class="round-course">Boulder Pointe — ${activeCourse.name}</div><div class="round-date">${fmtDate(activeRound.date)}</div></div>
    </div>
    ${cards}
    <div style="text-align:center;margin-top:4px;">
      <button style="font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;" onclick="renderPlayerSelect()">Enter without a matchup</button>
    </div>`;
}

function getTeamNumber(teamId) {
  const t = teams.find(t=>t.id===teamId);
  return t ? t.team_number : '?';
}

function getTeamDisplay(teamId, matchupId, slot) {
  const memOverrides = matchupOverrides[matchupId] || {};
  const t = teams.find(t=>t.id===teamId);
  if(!t) return { names:'Unknown', playerNames:'Unknown', pids:[], teamLabel:'??' };

  const mx = matchups.find(m=>m.id===matchupId);
  const dbP1 = slot===1 ? mx?.team1_p1_override : mx?.team2_p1_override;
  const dbP2 = slot===1 ? mx?.team1_p2_override : mx?.team2_p2_override;
  const p1id = memOverrides[`${slot}_p1`] || dbP1 || t.player1_id;
  const p2id = memOverrides[`${slot}_p2`] || dbP2 || t.player2_id;

  const resolvePlayer = (pid) => {
    let p = players.find(p=>p.id===pid);
    if(p) return p;
    let s = subs.find(s=>s.id===pid);
    if(s) return s;
    return null;
  };

  const r1 = resolvePlayer(p1id);
  const r2 = resolvePlayer(p2id);
  const isSubId = (pid) => !players.some(p=>p.id===pid);

  const n1 = r1 ? r1.name + (isSubId(p1id)?' <span class="sub-tag-inline">(Sub)</span>':'') : '?';
  const n2 = r2 ? r2.name + (isSubId(p2id)?' <span class="sub-tag-inline">(Sub)</span>':'') : '?';
  const plain1 = r1 ? r1.name : '?';
  const plain2 = r2 ? r2.name : '?';

  return {
    names: n1 + '<br>' + n2,
    playerNames: plain1 + '<br>' + plain2,
    teamLabel: `${plain1.split(' ')[0]}/${plain2.split(' ')[0]}`,
    pids: [p1id, p2id]
  };
}

function selectMatchup(matchupId) {
  const m = matchups.find(x=>x.id===matchupId);
  if(!m) return;
  activeMatchupId = matchupId;
  const t1 = getTeamDisplay(m.team1_id, matchupId, 1);
  const t2 = getTeamDisplay(m.team2_id, matchupId, 2);
  selectedGroup = [...t1.pids, ...t2.pids];
  selectedGroup.forEach(pid => {
    if (pid.startsWith('sub_')) { if (!groupScores[pid]) groupScores[pid]={}; }
    else { groupScores[pid] = { ...(scoreMap[pid]||{}) }; }
  });
  groupMode = true;
  renderGroupScorecard();
}

function allSelectablePlayers() { return [...players, ...subs]; }

function renderPlayerSelect() {
  const el = document.getElementById('entryContent');
  const all = allSelectablePlayers();
  const count = selectedGroup.length;
  const maxed = count >= 4;
  let btns='';
  all.forEach(p=>{
    const isSelected = selectedGroup.includes(p.id);
    const isSub = subs.some(s=>s.id===p.id);
    const has = !isSub && scoreMap[p.id]&&Object.keys(scoreMap[p.id]).length>0;
    const disabled = maxed && !isSelected;
    if(isSub){
      btns+=`<button class="player-btn ${isSelected?'selected':''} ${disabled?'disabled-btn':''}" onclick="togglePlayer('${p.id}')" ${disabled?'disabled':''}>${p.name} <span style="font-size:10px;opacity:0.6">(Sub)</span></button>`;
    } else {
      btns+=`<button class="player-btn ${isSelected?'selected':''} ${has?'has-scores':''} ${disabled?'disabled-btn':''}" onclick="togglePlayer('${p.id}')" ${disabled?'disabled':''}>${p.name}</button>`;
    }
  });
  const subDisabled = maxed && !showSubInput ? 'disabled' : '';
  btns+=`<button class="sub-btn ${showSubInput?'selected':''}" onclick="toggleSubInput()" ${subDisabled}>+ Add Sub</button>`;
  const subInputHtml = showSubInput ? `
    <div class="sub-input-row">
      <input class="sub-input" id="subNameInput" type="text" placeholder="Sub's name" maxlength="40" onkeydown="if(event.key==='Enter')addSub()">
      <button class="sub-add-btn" onclick="addSub()">Add</button>
    </div>` : '';
  el.innerHTML=`
    <div class="card">
      <div class="section-label">Select Your Group (up to 4)</div>
      <div class="player-grid" id="playerGrid">${btns}${subInputHtml}</div>
    </div>
    <button class="start-group-btn" onclick="startGroupScorecard()" ${count===0?'disabled':''}>
      Start Scorecard${count>0?' ('+count+' player'+(count>1?'s':'')+')':''}
    </button>
    <div class="group-hint">${count===0?'Tap players to select your group':'Tap Start Scorecard to begin entering scores'}</div>`;
  if(showSubInput) setTimeout(()=>{ const i=document.getElementById('subNameInput'); if(i) i.focus(); },50);
}

function toggleSubInput() { showSubInput=!showSubInput; renderPlayerSelect(); }
function addSub() {
  const input=document.getElementById('subNameInput'); if(!input) return;
  const name=input.value.trim(); if(!name) return;
  if(selectedGroup.length>=4) return;
  const id='sub_'+Date.now();
  subs.push({id,name}); selectedGroup.push(id);
  showSubInput=false; renderPlayerSelect();
}
function togglePlayer(id) {
  if(selectedGroup.includes(id)) selectedGroup=selectedGroup.filter(p=>p!==id);
  else if(selectedGroup.length<4) selectedGroup.push(id);
  renderPlayerSelect();
}
function startGroupScorecard() {
  if(selectedGroup.length===0) return;
  groupScores={};
  selectedGroup.forEach(pid=>{ groupScores[pid]={...(scoreMap[pid]||{})}; });
  groupMode=true; showSubInput=false; renderGroupScorecard();
}

function renderGroupScorecard() {
  const el=document.getElementById('entryContent');
  const cd=courseData(); if(!cd) return;
  const groupPlayers=selectedGroup.map(id=>allSelectablePlayers().find(p=>p.id===id)).filter(Boolean);
  let hdrCells=`<th class="lbl-cell col-label">HOLE</th>`;
  for(let h=1;h<=9;h++) hdrCells+=`<th class="col-hole">${h}</th>`;
  hdrCells+=`<th class="tot-cell col-tot">TOT</th>`;
  const blueTotal=cd.blue.reduce((a,b)=>a+b,0), whiteTotal=cd.white.reduce((a,b)=>a+b,0);
  let blueCells=`<td class="lbl-cell">BLUE</td>`, whiteCells=`<td class="lbl-cell">WHITE</td>`;
  let parCells=`<td class="lbl-cell">PAR</td>`, hdcpCells=`<td class="lbl-cell">HDCP</td>`;
  for(let h=0;h<9;h++){
    blueCells+=`<td>${cd.blue[h]}</td>`; whiteCells+=`<td>${cd.white[h]}</td>`;
    parCells+=`<td>${cd.par[h]}</td>`; hdcpCells+=`<td>${cd.hdcp[h]}</td>`;
  }
  blueCells+=`<td>${blueTotal}</td>`; whiteCells+=`<td>${whiteTotal}</td>`;
  parCells+=`<td>${cd.par.reduce((a,b)=>a+b,0)}</td>`; hdcpCells+=`<td></td>`;
  let playerRows='';
  groupPlayers.forEach(p=>{
    const gs=groupScores[p.id]||{};
    let cells=''; let totalStrokes=0,holesPlayed=0,totalParPlayed=0;
    for(let h=1;h<=9;h++){
      const s=gs[h]??null, par=cd.par[h-1];
      let btnCls='score-cell-btn empty', display='·';
      if(s!==null){ const d=s-par; btnCls=`score-cell-btn ${vtpClass(d)}`; display=String(s); totalStrokes+=s; holesPlayed++; totalParPlayed+=par; }
      cells+=`<td><button class="${btnCls}" onclick="openPopover('${p.id}',${h})">${display}</button></td>`;
    }
    let totDisplay='—', vtpDisplay='', vtpCls='';
    if(holesPlayed>0){ const diff=totalStrokes-totalParPlayed; totDisplay=String(totalStrokes); vtpDisplay=vtpLabel(diff); vtpCls=`vtp-${vtpClass(diff)}`; }
    playerRows+=`<tr class="row-player"><td class="lbl-cell">${p.name}</td>${cells}<td class="tot-cell"><div class="player-tot">${totDisplay}<span class="vtp ${vtpCls}">${vtpDisplay}</span></div></td></tr>`;
  });
  const totalCells=groupPlayers.length*9;
  const filledCells=groupPlayers.reduce((sum,p)=>sum+Object.keys(groupScores[p.id]||{}).length,0);
  el.innerHTML=`
    <div class="scorecard-header">
      <div><div class="sc-title">Boulder Pointe — ${activeCourse.name}</div><div class="sc-date">${fmtDate(activeRound.date)}</div></div>
      <button class="sc-close-btn" onclick="exitGroupScorecard()">← Back</button>
    </div>
    <div class="scorecard-wrap">
      <table class="sc-table">
        <thead><tr class="row-holes">${hdrCells}</tr></thead>
        <tbody>
          <tr class="row-yards blue-row">${blueCells}</tr>
          <tr class="row-yards white-row">${whiteCells}</tr>
          <tr class="row-par">${parCells}</tr>
          <tr class="row-hdcp">${hdcpCells}</tr>
          ${playerRows}
        </tbody>
      </table>
    </div>
    <div class="finish-bar">
      <div class="finish-bar-info">
        <strong>${groupPlayers.map(p=>p.name.split(' ')[0]).join(', ')}</strong>
        ${filledCells} of ${totalCells} holes entered
      </div>
      <button class="btn-finish-group" onclick="finishGroup()">Save</button>
    </div>`;
}

function exitGroupScorecard() {
  groupMode=false; selectedGroup=[]; groupScores={}; activeMatchupId=null; showSubInput=false;
  renderEntry();
}

// ── POPOVER ───────────────────────────────────────────────────────────────────
function openPopover(playerId, hole) {
  popPlayerId=playerId; popHole=hole;
  const par=pars()[hole-1];
  const existing=(groupScores[playerId]||{})[hole]??null;
  popStrokes=existing!==null?existing:par;
  const player=players.find(p=>p.id===playerId);
  document.getElementById('popTitle').textContent=`Hole ${hole}`;
  document.getElementById('popSub').textContent=player?player.name:'';
  document.getElementById('popPar').textContent=`Par ${par}`;
  updatePopoverDisplay();
  document.getElementById('popoverOverlay').classList.add('open');
}
function updatePopoverDisplay() {
  const par=pars()[popHole-1];
  document.getElementById('popVal').textContent=popStrokes;
  const d=popStrokes-par, lbl=document.getElementById('popLabel');
  if(d===0){lbl.textContent='Even par';lbl.className='pop-label even';}
  else if(d<0){const names=['','Birdie','Eagle','Albatross'];lbl.textContent=names[Math.abs(d)]||`${Math.abs(d)} under`;lbl.className='pop-label under';}
  else{const names=['','Bogey','Double Bogey','Triple Bogey'];lbl.textContent=names[d]||`+${d}`;lbl.className='pop-label over';}
}
function popAdj(delta) { popStrokes=Math.max(1,popStrokes+delta); updatePopoverDisplay(); }
async function savePopover() {
  if(!groupScores[popPlayerId]) groupScores[popPlayerId]={};
  groupScores[popPlayerId][popHole]=popStrokes;
  const isInMemorySub=popPlayerId.startsWith('sub_')&&!subs.some(s=>s.id===popPlayerId&&s.fromDb);
  if(!isInMemorySub){
    const{error}=await sb.from('scores').upsert(
      {round_id:activeRound.id,player_id:popPlayerId,hole:popHole,strokes:popStrokes},
      {onConflict:'round_id,player_id,hole'}
    );
    if(error){ toast('Save failed: '+error.message); console.error('Score save error:',error); return; }
  }
  dismissPopover(); renderGroupScorecard();
}
async function clearScore() {
  if(groupScores[popPlayerId]) delete groupScores[popPlayerId][popHole];
  const isInMemorySubClear=popPlayerId.startsWith('sub_')&&!subs.some(s=>s.id===popPlayerId&&s.fromDb);
  if(!isInMemorySubClear){
    await sb.from('scores').delete().eq('round_id',activeRound.id).eq('player_id',popPlayerId).eq('hole',popHole);
  }
  dismissPopover(); renderGroupScorecard();
}
function dismissPopover() { document.getElementById('popoverOverlay').classList.remove('open'); }
function closePopover(e) { if(e.target===document.getElementById('popoverOverlay')) dismissPopover(); }
function finishGroup() { toast('Scores saved! 🏌️'); }

// ── HANDICAP OVERRIDE ADMIN ───────────────────────────────────────────────────
async function setHandicapOverride(playerId, value) {
  const v = value === '' ? null : parseInt(value, 10);
  if (v === null) { await clearHandicapOverride(playerId); return; }
  if (isNaN(v) || v < 0 || v > 30) return;

  try {
    await sb.from('handicaps').upsert(
      { player_id: playerId, override_value: v, season_id: activeSeason?.id || null },
      { onConflict: 'player_id' }
    );
    handicapOverrides[playerId] = v;
    toast('Handicap override saved ✓');
    loadAdminPanel();
  } catch(e) {
    // If table doesn't exist, store in memory only
    handicapOverrides[playerId] = v;
    toast('Saved (in-memory) ✓');
    loadAdminPanel();
  }
}

async function clearHandicapOverride(playerId) {
  try {
    await sb.from('handicaps').delete().eq('player_id', playerId);
  } catch(e) { /* ignore */ }
  delete handicapOverrides[playerId];
  toast('Override cleared');
  loadAdminPanel();
}

// ── MATCHUP ADMIN ─────────────────────────────────────────────────────────────
async function saveMatchups() {
  if(!activeRound) return;
  const msg=document.getElementById('matchupMsg');
  const rows=[];
  for(let i=1;i<=6;i++){
    const t1=document.getElementById(`m${i}t1`)?.value;
    const t2=document.getElementById(`m${i}t2`)?.value;
    if(t1&&t2&&t1!==t2) rows.push({round_id:activeRound.id,team1_id:t1,team2_id:t2});
  }
  if(rows.length===0){msg.textContent='Add at least one matchup.';msg.className='admin-msg err';return;}
  await sb.from('matchups').delete().eq('round_id',activeRound.id);
  const{error}=await sb.from('matchups').insert(rows);
  if(error){msg.textContent='Error saving matchups.';msg.className='admin-msg err';}
  else{msg.textContent=`${rows.length} matchups saved!`;msg.className='admin-msg ok';await loadScores();loadAdminPanel();toast('Matchups saved ✓');}
}

function setOverride(matchupId, slot, playerId) {
  if(playerId==='__add_sub__'){
    const inputDiv=document.getElementById(`subInput_${matchupId}_${slot}`);
    if(inputDiv){inputDiv.style.display='flex';const field=document.getElementById(`subInputField_${matchupId}_${slot}`);if(field) setTimeout(()=>field.focus(),50);}
    return;
  }
  if(!matchupOverrides[matchupId]) matchupOverrides[matchupId]={};
  matchupOverrides[matchupId][slot]=playerId;
}

async function confirmSub(matchupId, slot) {
  const field=document.getElementById(`subInputField_${matchupId}_${slot}`);
  if(!field) return;
  const name=field.value.trim(); if(!name) return;
  let playerId;
  const{data:existing}=await sb.from('players').select('*').ilike('name',name).limit(1);
  if(existing&&existing.length>0){
    playerId=existing[0].id;
    if(!subs.some(s=>s.id===playerId)) subs.push({id:playerId,name:existing[0].name,fromDb:true});
    toast(existing[0].name+' found — added as sub');
  } else {
    const{data:newPlayer,error}=await sb.from('players').insert({name,active:false}).select().single();
    if(error){toast('Error adding sub');return;}
    playerId=newPlayer.id;
    subs.push({id:playerId,name,fromDb:true});
    toast(name+' added as sub');
  }
  if(!matchupOverrides[matchupId]) matchupOverrides[matchupId]={};
  matchupOverrides[matchupId][slot]=playerId;
  loadAdminPanel();
}

function downloadResults() {
  const weekNum = document.getElementById('weekNumInput')?.value;
  const msg = document.getElementById('exportMsg');
  try {
    if (!weekNum) { msg.textContent='Enter a week number.'; msg.className='admin-msg err'; return; }
    if (!activeRound || !activeCourse) { msg.textContent='No active round.'; msg.className='admin-msg err'; return; }
    if (matchups.length === 0) { msg.textContent='No matchups set.'; msg.className='admin-msg err'; return; }

    const courseName = activeCourse.name || '';
    const wb = XLSX.utils.book_new();
    const wsData = [];

    for (var mi = 0; mi < matchups.length; mi++) {
      var m = matchups[mi];
      var t1 = getTeamDisplay(m.team1_id, m.id, 1);
      var t2 = getTeamDisplay(m.team2_id, m.id, 2);

      var t1p1hc = getEffectiveHandicap(t1.pids[0]);
      var t1p2hc = getEffectiveHandicap(t1.pids[1]);
      var t2p1hc = getEffectiveHandicap(t2.pids[0]);
      var t2p2hc = getEffectiveHandicap(t2.pids[1]);
      var team1Hdcp = t1p1hc + t1p2hc;
      var team2Hdcp = t2p1hc + t2p2hc;
      var sh = getStrokeHoles(team1Hdcp, team2Hdcp, courseName);
      var weakerIsTeam1 = sh.weakerIsA;
      var strokeHoles = sh.strokeHoles;
      var strokeMap = sh.strokeMap;

      // Per-hole results
      var team1HolePts=0, team2HolePts=0;
      var team1Strokes=0, team2Strokes=0;
      var team1Played=0, team2Played=0;
      var hr = [];
      for (var h = 1; h <= 9; h++) {
        var hIdx = h - 1;
        var t1s1 = (scoreMap[t1.pids[0]]||{})[h] !== undefined ? (scoreMap[t1.pids[0]]||{})[h] : null;
        var t1s2 = (scoreMap[t1.pids[1]]||{})[h] !== undefined ? (scoreMap[t1.pids[1]]||{})[h] : null;
        var t2s1 = (scoreMap[t2.pids[0]]||{})[h] !== undefined ? (scoreMap[t2.pids[0]]||{})[h] : null;
        var t2s2 = (scoreMap[t2.pids[1]]||{})[h] !== undefined ? (scoreMap[t2.pids[1]]||{})[h] : null;
        var t1both = t1s1 !== null && t1s2 !== null;
        var t2both = t2s1 !== null && t2s2 !== null;
        var t1c = t1both ? t1s1 + t1s2 : null;
        var t2c = t2both ? t2s1 + t2s2 : null;
        var isStroke = strokeHoles.indexOf(hIdx) >= 0;
        var t1n = t1c, t2n = t2c;
        if (isStroke) {
          if (weakerIsTeam1 && t1n !== null) t1n -= (strokeMap[hIdx] || 0);
          else if (!weakerIsTeam1 && t2n !== null) t2n -= (strokeMap[hIdx] || 0);
        }
        var t1pts = '', t2pts = '';
        if (t1both && t2both) {
          if (t1n < t2n)      { t1pts=2; t2pts=0; }
          else if (t1n===t2n) { t1pts=1; t2pts=1; }
          else                 { t1pts=0; t2pts=2; }
          team1HolePts += t1pts;
          team2HolePts += t2pts;
        }
        if (t1both) { team1Strokes += t1c; team1Played++; }
        if (t2both) { team2Strokes += t2c; team2Played++; }
        hr.push({ h:h, hIdx:hIdx, t1c:t1c, t2c:t2c, t1n:t1n, t2n:t2n, isStroke:isStroke, t1pts:t1pts, t2pts:t2pts, t1both:t1both, t2both:t2both });
      }

      var bothComplete = team1Played===9 && team2Played===9;
      var t1NetTotal = 0, t2NetTotal = 0;
      for (var ri = 0; ri < hr.length; ri++) {
        if (hr[ri].t1c !== null) t1NetTotal += (hr[ri].isStroke && weakerIsTeam1 ? hr[ri].t1c - (strokeMap[hr[ri].hIdx]||0) : hr[ri].t1c);
        if (hr[ri].t2c !== null) t2NetTotal += (hr[ri].isStroke && !weakerIsTeam1 ? hr[ri].t2c - (strokeMap[hr[ri].hIdx]||0) : hr[ri].t2c);
      }
      var team1TotPts=0, team2TotPts=0;
      if (bothComplete) {
        if (t1NetTotal < t2NetTotal)       { team1TotPts=4; team2TotPts=0; }
        else if (t1NetTotal === t2NetTotal) { team1TotPts=2; team2TotPts=2; }
        else                                { team1TotPts=0; team2TotPts=4; }
      }
      var team1Final = team1HolePts + team1TotPts;
      var team2Final = team2HolePts + team2TotPts;

      // Write team block inline (no nested function)
      for (var pass = 0; pass < 2; pass++) {
        var pids   = pass===0 ? t1.pids : t2.pids;
        var tHdcp  = pass===0 ? team1Hdcp : team2Hdcp;
        var holePts= pass===0 ? team1HolePts : team2HolePts;
        var totPts = pass===0 ? team1TotPts : team2TotPts;
        var finPts = pass===0 ? team1Final : team2Final;
        var netTot = pass===0 ? team1Strokes : team2Strokes;
        var isWeaker = pass===0 ? weakerIsTeam1 : !weakerIsTeam1;

        var p1n = allSelectablePlayers().find(function(p){ return p.id===pids[0]; });
        var p2n = allSelectablePlayers().find(function(p){ return p.id===pids[1]; });
        var p1name = p1n ? p1n.name : '?';
        var p2name = p2n ? p2n.name : '?';
        var p1hc = getEffectiveHandicap(pids[0]);
        var p2hc = getEffectiveHandicap(pids[1]);

        // Title row — only once per matchup, before team 1 block
        if (pass === 0) {
          wsData.push(['RCC Week ' + weekNum + ' The ' + courseName, '', '', '', '', '', '', '', '', '', '', '', '']);
        }

        // HOLE header row
        wsData.push(['', 'HOLE', 1, 2, 3, 4, 5, 6, 7, 8, 9, '', '']);

        // HCP row
        var hcpRow = ['', 'HCP'];
        for (var hh = 0; hh < 9; hh++) {
          hcpRow.push(isWeaker && strokeMap[hh] ? strokeMap[hh] : '');
        }
        hcpRow.push('', '');
        wsData.push(hcpRow);

        // Total label row
        wsData.push(['', '', '', '', '', '', '', '', '', '', '', 'Total', '']);

        // Player 1 row
        var p1row = [p1name, p1hc];
        var p1tot = 0;
        for (var hh = 1; hh <= 9; hh++) {
          var s = (scoreMap[pids[0]]||{})[hh] !== undefined ? (scoreMap[pids[0]]||{})[hh] : '';
          p1row.push(s !== '' ? s : '');
          if (s !== '') p1tot += s;
        }
        p1row.push(p1tot > 0 ? p1tot : '', '');
        wsData.push(p1row);

        // Player 2 row
        var p2row = [p2name, p2hc];
        var p2tot = 0;
        for (var hh = 1; hh <= 9; hh++) {
          var s = (scoreMap[pids[1]]||{})[hh] !== undefined ? (scoreMap[pids[1]]||{})[hh] : '';
          p2row.push(s !== '' ? s : '');
          if (s !== '') p2tot += s;
        }
        p2row.push(p2tot > 0 ? p2tot : '', '');
        wsData.push(p2row);

        // Team row
        wsData.push(['Team', tHdcp, '', '', '', '', '', '', '', '', '', netTot > 0 ? netTot : '', '']);

        // Pts row (hole-by-hole)
        var ptsRow = ['Pts', ''];
        for (var hh = 0; hh < hr.length; hh++) {
          var pts = pass===0 ? hr[hh].t1pts : hr[hh].t2pts;
          ptsRow.push(pts !== '' ? pts : '');
        }
        ptsRow.push(holePts, 'Hole Pts');
        wsData.push(ptsRow);

        // Totals Pts row
        wsData.push(['', '', '', '', '', '', '', '', '', '', '', totPts, 'Totals Pts']);

        // Final Pts row
        wsData.push(['', '', '', '', '', '', '', '', '', '', '', finPts, 'Final Pts']);

        if (pass === 0) {
          wsData.push(['vs', '', '', '', '', '', '', '', '', '', '', '', '']);
          wsData.push(['', '', '', '', '', '', '', '', '', '', '', '', '']);
        }
      }

      // Blank separator between matchups
      wsData.push(['', '', '', '', '', '', '', '', '', '', '', '', '']);
      wsData.push(['', '', '', '', '', '', '', '', '', '', '', '', '']);
    }

    var ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:22},{wch:5},
      {wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},
      {wch:8},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, 'Week ' + weekNum);
    XLSX.writeFile(wb, 'RCC_Week' + weekNum + '_Results.xlsx');
    msg.textContent = 'Downloaded!';
    msg.className = 'admin-msg ok';
    setTimeout(function(){ msg.textContent=''; }, 3000);

  } catch(err) {
    console.error('Export error:', err);
    msg.textContent = 'Export error: ' + err.message;
    msg.className = 'admin-msg err';
  }
}

async function saveMatchupOverrides(matchupId) {
  const ov=matchupOverrides[matchupId]||{};
  const mx=matchups.find(m=>m.id===matchupId); if(!mx) return;
  const t1=teams.find(t=>t.id===mx.team1_id), t2=teams.find(t=>t.id===mx.team2_id);
  const updates={
    team1_p1_override:ov['1_p1']||null, team1_p2_override:ov['1_p2']||null,
    team2_p1_override:ov['2_p1']||null, team2_p2_override:ov['2_p2']||null,
  };
  if(!updates.team1_p1_override||updates.team1_p1_override===t1?.player1_id) updates.team1_p1_override=null;
  if(!updates.team1_p2_override||updates.team1_p2_override===t1?.player2_id) updates.team1_p2_override=null;
  if(!updates.team2_p1_override||updates.team2_p1_override===t2?.player1_id) updates.team2_p1_override=null;
  if(!updates.team2_p2_override||updates.team2_p2_override===t2?.player2_id) updates.team2_p2_override=null;
  const{error}=await sb.from('matchups').update(updates).eq('id',matchupId);
  if(error){toast('Error saving changes');return;}
  const idx=matchups.findIndex(m=>m.id===matchupId);
  if(idx>-1) matchups[idx]={...matchups[idx],...updates};
  toast('Matchup saved ✓'); loadAdminPanel();
}

function checkPw() {
  const input=document.getElementById('pwInput'),err=document.getElementById('pwError');
  if(input.value===ADMIN_PW){adminUnlocked=true;renderAdmin();}
  else{input.classList.add('error');err.textContent='Incorrect password.';setTimeout(()=>{input.classList.remove('error');err.textContent='';},2000);}
}

async function startRound() {
  const courseId=document.getElementById('adminCourse').value;
  const date=document.getElementById('adminDate').value;
  const msg=document.getElementById('startMsg');
  if(!courseId||!date){msg.textContent='Pick a course and date.';msg.className='admin-msg err';return;}
  const{error}=await sb.from('rounds').insert({season_id:activeSeason.id,course_id:courseId,date,status:'active'});
  if(error){msg.textContent='Error starting round.';msg.className='admin-msg err';}
  else{msg.textContent='Round started!';msg.className='admin-msg ok';await reloadRound();loadAdminPanel();toast('Round started ⛳');}
}

async function setDisplayRound() {
  const id=document.getElementById('displayRoundSelect')?.value;
  const msg=document.getElementById('displayMsg'); if(!id) return;
  const{error}=await sb.from('seasons').update({display_round_id:id}).eq('id',activeSeason.id);
  if(error){msg.textContent='Error setting display round.';msg.className='admin-msg err';}
  else{activeSeason.display_round_id=id;msg.textContent='Display round updated!';msg.className='admin-msg ok';await reloadRound();loadAdminPanel();toast('Display round set ⛳');}
}

async function closeRound(roundId) {
  const{error}=await sb.from('rounds').update({status:'closed'}).eq('id',roundId);
  if(error){toast('Error closing round.');}
  else{
    if(activeSeason.display_round_id===roundId){await sb.from('seasons').update({display_round_id:null}).eq('id',activeSeason.id);activeSeason.display_round_id=null;}
    await reloadRound();loadAdminPanel();toast('Round closed.');
  }
}

async function reactivateRound(roundId) {
  const{error}=await sb.from('rounds').update({status:'active'}).eq('id',roundId);
  if(error){toast('Error reactivating round.');}
  else{await reloadRound();loadAdminPanel();toast('Round reactivated ⛳');}
}

// ── TABS ──────────────────────────────────────────────────────────────────────
let activeSegment = 'players';

function switchTab(tab) {
  const tabs=['scoreboard','entry','admin'];
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  tabs.forEach(v=>document.getElementById('view-'+v).classList.toggle('active',v===tab));
  if(tab==='scoreboard') {
    switchSegment(activeSegment||'players');
    loadScores().then(()=>{ renderScoreboard(); renderMatchupScores(); });
  }
}

function switchSegment(seg) {
  activeSegment = seg;
  document.getElementById('seg-players').classList.toggle('active', seg==='players');
  document.getElementById('seg-matchups').classList.toggle('active', seg==='matchups');
  document.getElementById('scoreboardContent').style.display = seg==='players' ? '' : 'none';
  document.getElementById('matchupsContent').style.display = seg==='matchups' ? '' : 'none';
}

init();
</script>
