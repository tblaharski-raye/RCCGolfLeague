<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCC Golf League</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Libre+Franklin:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-fairway: #3d7a52;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --score-under: #c0392b;
    --score-even: #27ae60;
    --score-over: #1a1a1a;
    --gold: #c9a84c;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,0.18);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Libre Franklin', sans-serif; background: var(--cream); color: var(--green-deep); min-height: 100vh; overflow-x: hidden; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: var(–green-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.4s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-family: ‘Playfair Display’, serif; font-size: 2rem; font-weight: 900; color: var(–cream); margin-bottom: 4px; }
.loading-logo span { color: var(–gold); }
.loading-sub { font-family: ‘DM Mono’, monospace; font-size: 0.7rem; color: rgba(245,240,232,0.4); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; }
.loading-spinner { width: 26px; height: 26px; border: 2px solid rgba(255,255,255,0.12); border-top-color: var(–gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* HEADER */
.header { background: var(–green-deep); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.3); }
.header-inner { max-width: 700px; margin: 0 auto; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.league-name { font-family: ‘Playfair Display’, serif; font-size: 1.45rem; font-weight: 900; color: var(–cream); letter-spacing: 0.02em; line-height: 1; }
.league-name span { color: var(–gold); }
.round-badge { background: var(–green-fairway); color: var(–cream); font-family: ‘DM Mono’, monospace; font-size: 0.68rem; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; }
.round-badge.live::before { content: ’● ’; color: #ff4444; animation: pulse 1.4s infinite; }
.round-badge.no-round { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.35); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* TABS */
.tabs { display: flex; gap: 4px; }
.tab { flex: 1; padding: 8px 0; background: transparent; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.55); font-family: ‘Libre Franklin’, sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.tab.active { background: var(–gold); border-color: var(–gold); color: var(–green-deep); }

/* MAIN */
.main { max-width: 700px; margin: 0 auto; padding: 20px 16px 100px; }
.view { display: none; }
.view.active { display: block; }

/* ROUND INFO BAR */
.round-info { background: var(–green-mid); border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; box-shadow: var(–shadow-sm); }
.round-info-left { color: var(–cream); }
.round-course { font-family: ‘Playfair Display’, serif; font-size: 1.05rem; font-weight: 700; }
.round-date { font-size: 0.75rem; color: rgba(245,240,232,0.65); margin-top: 2px; font-family: ‘DM Mono’, monospace; }
.round-players { text-align: right; color: var(–cream); }
.round-players .num { font-family: ‘Playfair Display’, serif; font-size: 1.5rem; font-weight: 700; color: var(–gold); line-height: 1; }
.round-players .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(245,240,232,0.6); }

/* SCOREBOARD */
.scoreboard-wrap { overflow-x: auto; border-radius: 12px; box-shadow: var(–shadow); background: var(–white); }
.scoreboard-table { width: 100%; min-width: 560px; border-collapse: collapse; font-size: 0.82rem; }
.scoreboard-table thead { background: var(–green-deep); color: var(–cream); }
.scoreboard-table thead th { padding: 10px 8px; font-family: ‘DM Mono’, monospace; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-align: center; }
.scoreboard-table thead th.name-col { text-align: left; padding-left: 14px; min-width: 140px; }
.par-row td { background: var(–green-fairway); color: var(–cream); font-family: ‘DM Mono’, monospace; font-size: 0.75rem; font-weight: 500; text-align: center; padding: 6px 8px; border-bottom: 2px solid var(–green-deep); }
.par-row td.name-col { text-align: left; padding-left: 14px; font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(245,240,232,0.8); }
.player-row { border-bottom: 1px solid var(–cream-dark); transition: background 0.15s; animation: fadeInRow 0.3s ease both; }
@keyframes fadeInRow { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.player-row:last-child { border-bottom: none; }
.player-row:hover { background: #f8f4ec; }
.player-row td { padding: 10px 8px; text-align: center; font-family: ‘DM Mono’, monospace; font-size: 0.8rem; }
.player-row td.name-col { text-align: left; padding-left: 14px; }
.player-name-cell { display: flex; flex-direction: column; gap: 2px; }
.player-name { font-family: ‘Libre Franklin’, sans-serif; font-weight: 600; font-size: 0.88rem; color: var(–green-deep); }
.player-status { font-size: 0.65rem; font-family: ‘DM Mono’, monospace; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
.player-status.active { color: var(–green-fairway); }
.player-status.done { color: #aaa; }
.hole-score { border-radius: 6px; width: 30px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-weight: 500; font-size: 0.8rem; }
.hole-score.under { background: rgba(192,57,43,0.12); color: var(–score-under); font-weight: 700; }
.hole-score.even  { background: rgba(39,174,96,0.12); color: var(–score-even); font-weight: 700; }
.hole-score.over  { color: var(–score-over); }
.hole-score.empty { color: #ccc; }
.total-col { font-weight: 700; font-size: 0.88rem; font-family: ‘Libre Franklin’, sans-serif; min-width: 40px; }
.total-col.under { color: var(–score-under); }
.total-col.even  { color: var(–score-even); }
.total-col.over  { color: var(–score-over); }
.pos-col { font-family: ‘Playfair Display’, serif; font-size: 0.9rem; font-weight: 700; color: var(–gold); min-width: 28px; }

/* NO ROUND */
.no-round-card { background: var(–white); border-radius: 14px; padding: 48px 24px; text-align: center; box-shadow: var(–shadow); }
.no-round-card .icon { font-size: 2.8rem; margin-bottom: 14px; }
.no-round-card h3 { font-family: ‘Playfair Display’, serif; font-size: 1.2rem; color: var(–green-deep); margin-bottom: 8px; }
.no-round-card p { font-size: 0.85rem; color: #888; line-height: 1.6; }

/* SCORE ENTRY */
.player-select-card { background: var(–white); border-radius: 14px; padding: 20px; box-shadow: var(–shadow); margin-bottom: 18px; }
.section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(–green-fairway); font-weight: 600; margin-bottom: 10px; font-family: ‘DM Mono’, monospace; }
.player-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.player-btn { padding: 12px 10px; background: var(–cream); border: 2px solid transparent; border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.88rem; font-weight: 600; color: var(–green-deep); cursor: pointer; transition: all 0.15s; text-align: center; position: relative; }
.player-btn:hover { background: var(–cream-dark); border-color: var(–green-fairway); }
.player-btn.selected { background: var(–green-deep); border-color: var(–green-deep); color: var(–cream); }
.player-btn.has-scores::after { content: ‘●’; position: absolute; top: 5px; right: 8px; font-size: 0.5rem; color: var(–green-fairway); }
.player-btn.selected.has-scores::after { color: var(–gold); }

.change-player-bar { display: none; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 10px 14px; background: var(–white); border-radius: 10px; box-shadow: var(–shadow-sm); }
.change-player-bar.visible { display: flex; }
.change-player-name { font-family: ‘Libre Franklin’, sans-serif; font-weight: 600; font-size: 0.95rem; color: var(–green-deep); }
.change-player-name span { font-size: 0.7rem; font-family: ‘DM Mono’, monospace; font-weight: 400; color: #888; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 1px; }
.change-player-link { font-size: 0.78rem; font-family: ‘DM Mono’, monospace; color: var(–green-fairway); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; padding: 4px 0; }
.change-player-link:hover { color: var(–green-deep); }

.hole-entry-card { background: var(–white); border-radius: 14px; padding: 24px 20px; box-shadow: var(–shadow); display: none; }
.hole-entry-card.visible { display: block; }
.hole-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.hole-number { font-family: ‘Playfair Display’, serif; font-size: 2.8rem; font-weight: 900; color: var(–green-deep); line-height: 1; }
.hole-par-badge { background: var(–green-mid); color: var(–cream); padding: 6px 14px; border-radius: 20px; font-family: ‘DM Mono’, monospace; font-size: 0.8rem; letter-spacing: 0.06em; }
.hole-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
.hole-dot { width: 8px; height: 8px; border-radius: 50%; background: var(–cream-dark); transition: all 0.2s; }
.hole-dot.completed { background: var(–green-fairway); }
.hole-dot.current { background: var(–gold); width: 10px; height: 10px; }
.hole-dot.under-par { background: var(–score-under); }

.strokes-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 24px 0; }
.stroke-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(–green-mid); background: transparent; font-size: 1.8rem; font-weight: 300; color: var(–green-mid); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; line-height: 1; }
.stroke-btn:hover { background: var(–green-deep); border-color: var(–green-deep); color: var(–cream); }
.stroke-btn:active { transform: scale(0.92); }
.stroke-display { font-family: ‘Playfair Display’, serif; font-size: 4rem; font-weight: 900; color: var(–green-deep); min-width: 80px; text-align: center; line-height: 1; }
.stroke-to-par { text-align: center; font-family: ‘DM Mono’, monospace; font-size: 0.85rem; margin-bottom: 4px; letter-spacing: 0.04em; min-height: 20px; }
.stroke-to-par.under { color: var(–score-under); font-weight: 700; }
.stroke-to-par.even  { color: var(–score-even); font-weight: 700; }
.stroke-to-par.over  { color: var(–score-over); }

.running-total { text-align: center; background: var(–cream); border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; display: flex; justify-content: space-around; }
.running-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.running-val { font-family: ‘Playfair Display’, serif; font-size: 1.3rem; font-weight: 700; }
.running-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; font-family: ‘DM Mono’, monospace; }

.entry-actions { display: flex; gap: 10px; }
.btn-primary { flex: 1; padding: 14px; background: var(–green-deep); color: var(–cream); border: none; border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
.btn-primary:hover { background: var(–green-mid); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { padding: 14px 18px; background: transparent; color: var(–green-deep); border: 2px solid var(–cream-dark); border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-secondary:hover { border-color: var(–green-mid); }
.btn-finish { flex: 1; padding: 14px; background: var(–gold); color: var(–green-deep); border: none; border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn-finish:hover { background: #b8923e; }

/* FINISHED CARD */
.finished-card { background: var(–white); border-radius: 14px; padding: 30px 20px; box-shadow: var(–shadow); text-align: center; display: none; }
.finished-card.visible { display: block; }
.finished-icon { font-size: 2.5rem; margin-bottom: 10px; }
.finished-name { font-family: ‘Playfair Display’, serif; font-size: 1.3rem; font-weight: 700; color: var(–green-deep); margin-bottom: 4px; }
.finished-score { font-family: ‘DM Mono’, monospace; font-size: 1rem; margin-bottom: 20px; }
.finished-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-bottom: 20px; }
.finished-hole { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.finished-hole-num { font-size: 0.6rem; color: #aaa; font-family: ‘DM Mono’, monospace; }
.finished-hole-score { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: ‘DM Mono’, monospace; font-size: 0.8rem; font-weight: 700; }

/* ADMIN */
.admin-lock { background: var(–white); border-radius: 14px; padding: 32px 24px; box-shadow: var(–shadow); text-align: center; }
.admin-lock h3 { font-family: ‘Playfair Display’, serif; font-size: 1.2rem; margin-bottom: 6px; }
.admin-lock p { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
.admin-input { width: 100%; padding: 12px 14px; border: 2px solid var(–cream-dark); border-radius: 10px; font-family: ‘DM Mono’, monospace; font-size: 1rem; text-align: center; letter-spacing: 0.1em; outline: none; transition: border-color 0.2s; background: var(–cream); color: var(–green-deep); }
.admin-input:focus { border-color: var(–green-fairway); }
.admin-input.error { border-color: var(–score-under); }
.admin-error { color: var(–score-under); font-size: 0.78rem; font-family: ‘DM Mono’, monospace; margin-top: 8px; min-height: 18px; }

.admin-panel { display: flex; flex-direction: column; gap: 16px; }
.admin-card { background: var(–white); border-radius: 14px; padding: 20px; box-shadow: var(–shadow); }
.admin-card h3 { font-family: ‘Playfair Display’, serif; font-size: 1rem; color: var(–green-deep); margin-bottom: 14px; }
.admin-field { margin-bottom: 12px; }
.admin-field label { display: block; font-size: 0.7rem; font-family: ‘DM Mono’, monospace; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 5px; }
.admin-select { width: 100%; padding: 10px 12px; border: 2px solid var(–cream-dark); border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.9rem; background: var(–cream); color: var(–green-deep); outline: none; transition: border-color 0.2s; }
.admin-select:focus { border-color: var(–green-fairway); }
.btn-danger { width: 100%; padding: 13px; background: transparent; color: var(–score-under); border: 2px solid var(–score-under); border-radius: 10px; font-family: ‘Libre Franklin’, sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
.btn-danger:hover { background: var(–score-under); color: var(–white); }
.btn-danger:disabled { opacity: 0.35; cursor: not-allowed; }
.admin-status { font-family: ‘DM Mono’, monospace; font-size: 0.78rem; margin-top: 10px; min-height: 18px; text-align: center; }
.admin-status.success { color: var(–score-even); }
.admin-status.error { color: var(–score-under); }

.active-round-info { background: var(–cream); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
.active-round-info .ari-label { font-family: ‘DM Mono’, monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 4px; }
.active-round-info .ari-val { font-family: ‘Playfair Display’, serif; font-size: 1rem; font-weight: 700; color: var(–green-deep); }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(–green-deep); color: var(–cream); font-family: ‘DM Mono’, monospace; font-size: 0.8rem; padding: 10px 20px; border-radius: 20px; z-index: 500; transition: transform 0.3s; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

.empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-state p { font-size: 0.88rem; line-height: 1.5; }

.scoreboard-wrap::-webkit-scrollbar { height: 4px; }
.scoreboard-wrap::-webkit-scrollbar-track { background: transparent; }
.scoreboard-wrap::-webkit-scrollbar-thumb { background: var(–green-fairway); border-radius: 2px; }
</style>

</head>
<body>

<!-- Loading -->

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">RCC <span>Golf</span></div>
  <div class="loading-sub">Boulder Pointe</div>
  <div class="loading-spinner"></div>
</div>

<!-- Toast -->

<div class="toast" id="toast"></div>

<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="league-name">RCC <span>Golf</span> League</div>
      <div class="round-badge" id="roundBadge">Loading...</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('scoreboard')">⛳ Scoreboard</button>
      <button class="tab" onclick="switchTab('entry')">✏️ Enter Scores</button>
      <button class="tab" onclick="switchTab('admin')">⚙️ Admin</button>
    </div>
  </div>
</header>

<main class="main">

  <!-- SCOREBOARD -->

  <div class="view active" id="view-scoreboard">
    <div id="scoreboardContent"></div>
  </div>

  <!-- SCORE ENTRY -->

  <div class="view" id="view-entry">
    <div id="entryContent"></div>
  </div>

  <!-- ADMIN -->

  <div class="view" id="view-admin">
    <div id="adminContent"></div>
  </div>

</main>

<script>
const SUPABASE_URL = 'https://vtnxjheizurqardgreeq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0bnhqaGVpenVycWFyZGdyZWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzA2MTIsImV4cCI6MjA5MzY0NjYxMn0.0tEGcXoVMZme75ryvYUjBg37r_9rsV0lLmULqm7c32w';
const ADMIN_PASSWORD = 'Accountant';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────────────────────────────
let activeSeason = null;
let activeRound  = null;
let activeCourse = null;
let players      = [];
let scoreMap     = {}; // { player_id: { hole: strokes } }
let adminUnlocked = false;

// Entry state
let entryPlayer   = null; // player object
let entryHole     = 0;    // 0-indexed
let entryScores   = [];   // array of 9, null or int
let currentStrokes = 0;
let savingHole    = false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pars = () => activeCourse ? activeCourse.pars : [];
const totalPar = () => pars().reduce((a, b) => a + b, 0);

function scoreToParLabel(diff) {
  if (diff === 0) return 'E';
  return diff > 0 ? '+' + diff : String(diff);
}

function scoreClass(diff) {
  if (diff < 0) return 'under';
  if (diff === 0) return 'even';
  return 'over';
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    // Load active season
    const { data: seasons } = await sb.from('seasons').select('*').eq('active', true).limit(1);
    activeSeason = seasons?.[0] || null;

    // Load players
    const { data: pl } = await sb.from('players').select('*').eq('active', true).order('name');
    players = pl || [];

    // Load active round
    if (activeSeason) {
      const { data: rounds } = await sb
        .from('rounds')
        .select('*, courses(*)')
        .eq('season_id', activeSeason.id)
        .eq('status', 'active')
        .limit(1);
      if (rounds?.[0]) {
        activeRound  = rounds[0];
        activeCourse = rounds[0].courses;
        activeCourse.pars = activeCourse.pars; // already parsed by supabase
        await loadScores();
      }
    }

    subscribeRealtime();
    updateBadge();
    renderAll();
  } catch (e) {
    console.error('Init error:', e);
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

async function loadScores() {
  if (!activeRound) { scoreMap = {}; return; }
  const { data } = await sb.from('scores').select('*').eq('round_id', activeRound.id);
  scoreMap = {};
  (data || []).forEach(s => {
    if (!scoreMap[s.player_id]) scoreMap[s.player_id] = {};
    scoreMap[s.player_id][s.hole] = s.strokes;
  });
}

function subscribeRealtime() {
  sb.channel('scores-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, async () => {
      await loadScores();
      renderScoreboard();
      renderEntry(); // refresh dot indicators
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rounds' }, async () => {
      // Reload round state if it changes
      await reloadRound();
    })
    .subscribe();
}

async function reloadRound() {
  if (!activeSeason) return;
  const { data: rounds } = await sb
    .from('rounds')
    .select('*, courses(*)')
    .eq('season_id', activeSeason.id)
    .eq('status', 'active')
    .limit(1);
  if (rounds?.[0]) {
    activeRound  = rounds[0];
    activeCourse = rounds[0].courses;
    await loadScores();
  } else {
    activeRound  = null;
    activeCourse = null;
    scoreMap     = {};
  }
  updateBadge();
  renderAll();
}

function updateBadge() {
  const badge = document.getElementById('roundBadge');
  if (activeRound) {
    badge.textContent = 'Live';
    badge.className = 'round-badge live';
  } else {
    badge.textContent = 'No Round';
    badge.className = 'round-badge no-round';
  }
}

function renderAll() {
  renderScoreboard();
  renderEntry();
  renderAdmin();
}

// ── SCOREBOARD ────────────────────────────────────────────────────────────────
function renderScoreboard() {
  const el = document.getElementById('scoreboardContent');

  if (!activeRound || !activeCourse) {
    el.innerHTML = `
      <div class="no-round-card">
        <div class="icon">⛳</div>
        <h3>No Active Round</h3>
        <p>Head to the Admin tab to start this week's round.</p>
      </div>`;
    return;
  }

  // Count players with any scores
  const activePlayers = players.filter(p => scoreMap[p.id] && Object.keys(scoreMap[p.id]).length > 0);
  const playerCount = activePlayers.length;

  // Build rows for ALL players who have scores
  const rows = activePlayers.map(p => {
    const holes = scoreMap[p.id] || {};
    const scoreArr = pars().map((_, i) => holes[i + 1] ?? null);
    const played = scoreArr.filter(s => s !== null);
    const strokes = played.reduce((a, b) => a + b, 0);
    const parPlayed = pars().slice(0, played.length).reduce((a, b) => a + b, 0);
    const diff = played.length > 0 ? strokes - parPlayed : null;
    return { p, scoreArr, played, strokes, diff };
  });

  rows.sort((a, b) => {
    if (a.diff === null && b.diff === null) return 0;
    if (a.diff === null) return 1;
    if (b.diff === null) return -1;
    if (a.diff !== b.diff) return a.diff - b.diff;
    return b.played.length - a.played.length;
  });

  let parCells = `<tr class="par-row"><td class="name-col">Par</td>`;
  pars().forEach(p => parCells += `<td>${p}</td>`);
  parCells += `<td>${totalPar()}</td><td>—</td></tr>`;

  let bodyRows = '';
  if (rows.length === 0) {
    bodyRows = `<tr><td colspan="12"><div class="empty-state"><div class="empty-icon">⛳</div><p>No scores yet. Players can enter scores in the Enter Scores tab.</p></div></td></tr>`;
  } else {
    rows.forEach((row, idx) => {
      const holesPlayed = row.played.length;
      const statusText  = holesPlayed === 9 ? 'F' : holesPlayed > 0 ? `Thru ${holesPlayed}` : '—';
      const statusClass = holesPlayed === 9 ? 'done' : holesPlayed > 0 ? 'active' : '';
      let holeCells = '';
      for (let h = 0; h < 9; h++) {
        const strk = row.scoreArr[h];
        if (strk === null) {
          holeCells += `<td><span class="hole-score empty">·</span></td>`;
        } else {
          const d = strk - pars()[h];
          holeCells += `<td><span class="hole-score ${scoreClass(d)}">${strk}</span></td>`;
        }
      }
      const totStr  = holesPlayed > 0 ? row.strokes : '—';
      const diffStr = row.diff !== null ? scoreToParLabel(row.diff) : '—';
      const diffCls = row.diff !== null ? scoreClass(row.diff) : '';
      bodyRows += `
        <tr class="player-row">
          <td class="name-col">
            <div class="player-name-cell">
              <div style="display:flex;align-items:center;gap:6px;">
                <span class="pos-col">${idx + 1}</span>
                <span class="player-name">${row.p.name}</span>
              </div>
              <span class="player-status ${statusClass}">${statusText}</span>
            </div>
          </td>
          ${holeCells}
          <td class="total-col">${totStr}</td>
          <td class="total-col ${diffCls}">${diffStr}</td>
        </tr>`;
    });
  }

  el.innerHTML = `
    <div class="round-info">
      <div class="round-info-left">
        <div class="round-course">Boulder Pointe — ${activeCourse.name}</div>
        <div class="round-date">${formatDate(activeRound.date)}</div>
      </div>
      <div class="round-players">
        <div class="num">${playerCount}</div>
        <div class="lbl">Playing</div>
      </div>
    </div>
    <div class="scoreboard-wrap">
      <table class="scoreboard-table">
        <thead>
          <tr>
            <th class="name-col">#&nbsp;&nbsp;Player</th>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
            <th>6</th><th>7</th><th>8</th><th>9</th>
            <th>TOT</th><th>+/-</th>
          </tr>
        </thead>
        <tbody>${parCells}</tbody>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

// ── SCORE ENTRY ───────────────────────────────────────────────────────────────
function renderEntry() {
  const el = document.getElementById('entryContent');

  if (!activeRound || !activeCourse) {
    el.innerHTML = `
      <div class="no-round-card">
        <div class="icon">✏️</div>
        <h3>No Active Round</h3>
        <p>An admin needs to start this week's round before scores can be entered.</p>
      </div>`;
    return;
  }

  // If a player is selected, keep the hole entry UI intact
  if (entryPlayer) return;

  // Player grid
  let playerBtns = '';
  players.forEach(p => {
    const holes = scoreMap[p.id] || {};
    const hasScores = Object.keys(holes).length > 0;
    playerBtns += `
      <button class="player-btn ${hasScores ? 'has-scores' : ''}"
        onclick="selectPlayer('${p.id}')">
        ${p.name}
      </button>`;
  });

  el.innerHTML = `
    <div class="player-select-card" id="playerSelectCard">
      <div class="section-label">Select Your Name</div>
      <div class="player-grid">${playerBtns}</div>
    </div>
    <div class="change-player-bar" id="changePlayerBar">
      <div class="change-player-name">
        <span>Entering scores for</span>
        <span id="changePlayerName"></span>
      </div>
      <button class="change-player-link" onclick="resetEntry()">← Change Player</button>
    </div>
    <div class="hole-entry-card" id="holeEntryCard">
      <div class="hole-header">
        <div>
          <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#888;font-family:'DM Mono',monospace;margin-bottom:2px;">Hole</div>
          <div class="hole-number" id="holeNumber">1</div>
        </div>
        <div class="hole-par-badge" id="holeParBadge">Par 4</div>
      </div>
      <div class="hole-nav" id="holeNav"></div>
      <div class="strokes-control">
        <button class="stroke-btn" onclick="adjustStrokes(-1)">−</button>
        <div class="stroke-display" id="strokeDisplay">4</div>
        <button class="stroke-btn" onclick="adjustStrokes(1)">+</button>
      </div>
      <div class="stroke-to-par" id="strokeToPar"></div>
      <div class="running-total">
        <div class="running-item">
          <div class="running-val" id="runningStrokes">—</div>
          <div class="running-lbl">Strokes</div>
        </div>
        <div class="running-item">
          <div class="running-val" id="runningVsPar" style="color:var(--score-even)">E</div>
          <div class="running-lbl">vs Par</div>
        </div>
        <div class="running-item">
          <div class="running-val" id="runningHoles">0/9</div>
          <div class="running-lbl">Holes</div>
        </div>
      </div>
      <div class="entry-actions" id="entryActions"></div>
    </div>
    <div class="finished-card" id="finishedCard">
      <div class="finished-icon">🏌️</div>
      <div class="finished-name" id="finishedName"></div>
      <div class="finished-score" id="finishedScore"></div>
      <div class="finished-grid" id="finishedGrid"></div>
      <button class="btn-primary" onclick="resetEntry()">Enter Scores for Another Player</button>
    </div>`;
}

function selectPlayer(playerId) {
  entryPlayer = players.find(p => p.id === playerId);
  if (!entryPlayer) return;

  // Load existing scores for this player
  const holes = scoreMap[entryPlayer.id] || {};
  entryScores = pars().map((_, i) => holes[i + 1] ?? null);

  // Jump to first empty hole
  entryHole = entryScores.findIndex(s => s === null);
  if (entryHole === -1) entryHole = 8;

  currentStrokes = entryScores[entryHole] !== null ? entryScores[entryHole] : pars()[entryHole];

  // Hide grid, show entry
  document.getElementById('playerSelectCard').style.display = 'none';
  const bar = document.getElementById('changePlayerBar');
  bar.classList.add('visible');
  document.getElementById('changePlayerName').textContent = entryPlayer.name;

  document.getElementById('holeEntryCard').classList.add('visible');
  renderHoleEntry();
}

function renderHoleEntry() {
  if (!document.getElementById('holeNumber')) return;

  const par = pars()[entryHole];
  document.getElementById('holeNumber').textContent = entryHole + 1;
  document.getElementById('holeParBadge').textContent = `Par ${par}`;
  document.getElementById('strokeDisplay').textContent = currentStrokes;

  // Dots
  const nav = document.getElementById('holeNav');
  nav.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    let cls = 'hole-dot';
    if (i === entryHole) cls += ' current';
    else if (entryScores[i] !== null) {
      const d = entryScores[i] - pars()[i];
      cls += d < 0 ? ' under-par' : ' completed';
    }
    nav.innerHTML += `<div class="${cls}"></div>`;
  }

  // Stroke label
  const holeDiff = currentStrokes - par;
  const tpEl = document.getElementById('strokeToPar');
  if (holeDiff === 0) {
    tpEl.textContent = 'Even par'; tpEl.className = 'stroke-to-par even';
  } else if (holeDiff < 0) {
    const labels = ['', 'Birdie', 'Eagle', 'Albatross'];
    tpEl.textContent = labels[Math.abs(holeDiff)] || `${Math.abs(holeDiff)} under`;
    tpEl.className = 'stroke-to-par under';
  } else {
    const labels = ['', 'Bogey', 'Double Bogey', 'Triple Bogey'];
    tpEl.textContent = labels[holeDiff] || `+${holeDiff}`;
    tpEl.className = 'stroke-to-par over';
  }

  // Running totals
  const played = entryScores.filter(s => s !== null);
  const playedPar = pars().slice(0, played.length).reduce((a, b) => a + b, 0);
  const totalStrokes = played.reduce((a, b) => a + b, 0);
  const runDiff = played.length > 0 ? totalStrokes - playedPar : 0;

  document.getElementById('runningStrokes').textContent = played.length > 0 ? totalStrokes : '—';
  const rvp = document.getElementById('runningVsPar');
  rvp.textContent = played.length > 0 ? scoreToParLabel(runDiff) : 'E';
  rvp.style.color = runDiff < 0 ? 'var(--score-under)' : runDiff === 0 ? 'var(--score-even)' : 'var(--score-over)';
  document.getElementById('runningHoles').textContent = `${played.length}/9`;

  // Buttons
  const isLastHole = entryHole === 8;
  const actions = document.getElementById('entryActions');
  const backDisabled = entryHole === 0 ? "disabled style='opacity:0.3'" : '';
  if (isLastHole) {
    actions.innerHTML = `
      <button class="btn-secondary" onclick="prevHole()" ${backDisabled}>← Back</button>
      <button class="btn-finish" onclick="finishRound()">Finish Round ✓</button>`;
  } else {
    actions.innerHTML = `
      <button class="btn-secondary" onclick="prevHole()" ${backDisabled}>← Back</button>
      <button class="btn-primary" id="btnSaveNext" onclick="saveHole()">Save & Next →</button>`;
  }
}

function adjustStrokes(delta) {
  currentStrokes = Math.max(1, currentStrokes + delta);
  renderHoleEntry();
}

async function saveHole() {
  if (savingHole) return;
  savingHole = true;
  const btn = document.getElementById('btnSaveNext');
  if (btn) btn.disabled = true;

  entryScores[entryHole] = currentStrokes;
  await upsertScore(entryHole + 1, currentStrokes);

  if (entryHole < 8) {
    entryHole++;
    currentStrokes = entryScores[entryHole] !== null ? entryScores[entryHole] : pars()[entryHole];
  }

  savingHole = false;
  renderHoleEntry();
}

function prevHole() {
  if (entryHole > 0) {
    entryScores[entryHole] = currentStrokes;
    entryHole--;
    currentStrokes = entryScores[entryHole] !== null ? entryScores[entryHole] : pars()[entryHole];
    renderHoleEntry();
  }
}

async function finishRound() {
  entryScores[entryHole] = currentStrokes;
  await upsertScore(entryHole + 1, currentStrokes);

  const total = entryScores.reduce((a, b) => (a || 0) + (b || 0), 0);
  const diff  = total - totalPar();

  document.getElementById('finishedName').textContent = entryPlayer.name;
  document.getElementById('finishedScore').textContent = `${total} strokes — ${scoreToParLabel(diff)} par`;
  document.getElementById('finishedScore').style.color =
    diff < 0 ? 'var(--score-under)' : diff === 0 ? 'var(--score-even)' : 'var(--score-over)';

  const grid = document.getElementById('finishedGrid');
  grid.innerHTML = '';
  entryScores.forEach((s, i) => {
    const d   = s - pars()[i];
    const bg  = d < 0 ? 'rgba(192,57,43,0.12)' : d === 0 ? 'rgba(39,174,96,0.12)' : 'rgba(0,0,0,0.06)';
    const col = d < 0 ? 'var(--score-under)' : d === 0 ? 'var(--score-even)' : 'var(--score-over)';
    grid.innerHTML += `
      <div class="finished-hole">
        <div class="finished-hole-num">${i + 1}</div>
        <div class="finished-hole-score" style="background:${bg};color:${col}">${s}</div>
      </div>`;
  });

  document.getElementById('holeEntryCard').classList.remove('visible');
  document.getElementById('finishedCard').classList.add('visible');
  showToast('Round saved! 🏌️');
}

async function upsertScore(hole, strokes) {
  if (!activeRound || !entryPlayer) return;
  await sb.from('scores').upsert({
    round_id:  activeRound.id,
    player_id: entryPlayer.id,
    hole,
    strokes
  }, { onConflict: 'round_id,player_id,hole' });
}

function resetEntry() {
  entryPlayer    = null;
  entryHole      = 0;
  entryScores    = [];
  currentStrokes = 0;
  renderEntry();
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin() {
  const el = document.getElementById('adminContent');

  if (!adminUnlocked) {
    el.innerHTML = `
      <div class="admin-lock">
        <h3>Admin Access</h3>
        <p>Enter the admin password to continue.</p>
        <input class="admin-input" id="adminPwInput" type="password" placeholder="Password"
          onkeydown="if(event.key==='Enter') checkAdminPw()">
        <div class="admin-error" id="adminError"></div>
        <br><br>
        <button class="btn-primary" onclick="checkAdminPw()">Unlock</button>
      </div>`;
    return;
  }

  // Build course options
  // We'll load courses dynamically
  el.innerHTML = `<div class="admin-panel" id="adminPanel"><div style="text-align:center;padding:20px;font-family:'DM Mono',monospace;font-size:0.8rem;color:#aaa;">Loading...</div></div>`;
  loadAdminPanel();
}

async function loadAdminPanel() {
  const { data: courses } = await sb.from('courses').select('*').order('name');
  const panel = document.getElementById('adminPanel');
  if (!panel) return;

  let courseOptions = (courses || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  const activeInfo = activeRound
    ? `<div class="active-round-info">
        <div class="ari-label">Current Active Round</div>
        <div class="ari-val">Boulder Pointe — ${activeCourse.name}</div>
        <div style="font-size:0.75rem;color:#888;font-family:'DM Mono',monospace;margin-top:3px;">${formatDate(activeRound.date)}</div>
       </div>`
    : `<div class="active-round-info" style="opacity:0.5">
        <div class="ari-label">No Active Round</div>
       </div>`;

  panel.innerHTML = `
    <div class="admin-card">
      <h3>Start New Round</h3>
      <div class="admin-field">
        <label>Course</label>
        <select class="admin-select" id="adminCourse">${courseOptions}</select>
      </div>
      <div class="admin-field">
        <label>Date</label>
        <input type="date" class="admin-select" id="adminDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <button class="btn-primary" onclick="startRound()" style="width:100%;margin-top:4px;">Start Round</button>
      <div class="admin-status" id="startStatus"></div>
    </div>

    <div class="admin-card">
      <h3>Active Round</h3>
      ${activeInfo}
      <button class="btn-danger" onclick="closeRound()" ${!activeRound ? 'disabled' : ''}>Close Active Round</button>
      <div class="admin-status" id="closeStatus"></div>
    </div>`;
}

function checkAdminPw() {
  const input = document.getElementById('adminPwInput');
  const errEl = document.getElementById('adminError');
  if (input.value === ADMIN_PASSWORD) {
    adminUnlocked = true;
    renderAdmin();
  } else {
    input.classList.add('error');
    errEl.textContent = 'Incorrect password.';
    setTimeout(() => { input.classList.remove('error'); errEl.textContent = ''; }, 2000);
  }
}

async function startRound() {
  const courseId = document.getElementById('adminCourse').value;
  const date     = document.getElementById('adminDate').value;
  const statusEl = document.getElementById('startStatus');

  if (!courseId || !date) {
    statusEl.textContent = 'Please select a course and date.';
    statusEl.className = 'admin-status error';
    return;
  }

  // Close any existing active round first
  if (activeRound) {
    await sb.from('rounds').update({ status: 'closed' }).eq('id', activeRound.id);
  }

  const { error } = await sb.from('rounds').insert({
    season_id: activeSeason.id,
    course_id: courseId,
    date,
    status: 'active'
  });

  if (error) {
    statusEl.textContent = 'Error starting round.';
    statusEl.className = 'admin-status error';
  } else {
    statusEl.textContent = 'Round started!';
    statusEl.className = 'admin-status success';
    await reloadRound();
    loadAdminPanel();
    showToast('Round started ⛳');
  }
}

async function closeRound() {
  if (!activeRound) return;
  const statusEl = document.getElementById('closeStatus');

  const { error } = await sb.from('rounds').update({ status: 'closed' }).eq('id', activeRound.id);

  if (error) {
    statusEl.textContent = 'Error closing round.';
    statusEl.className = 'admin-status error';
  } else {
    statusEl.textContent = 'Round closed.';
    statusEl.className = 'admin-status success';
    await reloadRound();
    loadAdminPanel();
    showToast('Round closed.');
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active',
      (i === 0 && tab === 'scoreboard') ||
      (i === 1 && tab === 'entry') ||
      (i === 2 && tab === 'admin')
    );
  });
  ['scoreboard','entry','admin'].forEach(v => {
    document.getElementById(`view-${v}`).classList.toggle('active', v === tab);
  });
}

// ── GO ────────────────────────────────────────────────────────────────────────
init();
</script>
