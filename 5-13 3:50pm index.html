<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RCC Golf League</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f0e8; color: #1a3a2a; min-height: 100vh; overflow-x: hidden; }

/* LOADING */
#loadingOverlay { position: fixed; top:0;left:0;right:0;bottom:0; background:#1a3a2a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; transition:opacity 0.4s ease; }
#loadingOverlay.hidden { opacity:0; pointer-events:none; }
.loading-logo { font-size:28px; font-weight:800; color:#f5f0e8; margin-bottom:4px; }
.loading-logo span { color:#c9a84c; }
.loading-sub { font-size:11px; color:rgba(245,240,232,0.4); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:28px; }
.spinner { width:26px; height:26px; border:2.5px solid rgba(255,255,255,0.12); border-top-color:#c9a84c; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* HEADER */
#appHeader { background:#1a3a2a; padding:16px 16px 0 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.35); }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.league-name { font-size:22px; font-weight:800; color:#f5f0e8; }
.league-name span { color:#c9a84c; }
.round-badge { font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.07em; text-transform:uppercase; background:#3d7a52; color:#f5f0e8; }
.round-badge.live::before { content:’● ’; color:#ff4444; animation:pulse 1.4s infinite; }
.round-badge.no-round { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.35); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.tabs { display:flex; gap:0; }
.tab-btn { flex:1; padding:11px 6px; background:transparent; border:none; border-bottom:3px solid transparent; color:rgba(255,255,255,0.45); font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; transition:color 0.2s,border-color 0.2s; -webkit-appearance:none; }
.tab-btn.active { color:#c9a84c; border-bottom:3px solid #c9a84c; }

/* MAIN */
.main { max-width:700px; margin:0 auto; padding:18px 14px 90px; }
.view { display:none; }
.view.active { display:block; }

/* ROUND INFO */
.round-info { background:#2d5a3d; border-radius:12px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
.round-course { font-size:16px; font-weight:700; color:#f5f0e8; margin-bottom:3px; }
.round-date { font-size:12px; color:rgba(245,240,232,0.6); }
.round-players-num { font-size:26px; font-weight:800; color:#c9a84c; line-height:1; text-align:right; }
.round-players-lbl { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(245,240,232,0.55); text-align:right; }

/* SCOREBOARD TABLE */
.scoreboard-wrap { overflow-x:auto; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.14); background:#ffffff; -webkit-overflow-scrolling:touch; }
.scoreboard-table { width:100%; min-width:540px; border-collapse:collapse; font-size:13px; }
.scoreboard-table thead { background:#1a3a2a; }
.scoreboard-table thead th { padding:10px 7px; font-size:11px; font-weight:600; letter-spacing:0.06em; text-align:center; color:#f5f0e8; }
.scoreboard-table thead th.name-col { text-align:left; padding-left:14px; min-width:130px; }
.par-row td { background:#3d7a52; color:#f5f0e8; font-size:12px; font-weight:600; text-align:center; padding:6px 7px; border-bottom:2px solid #1a3a2a; }
.par-row td.name-col { text-align:left; padding-left:14px; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; color:rgba(245,240,232,0.75); }
.player-row { border-bottom:1px solid #e8e0d0; }
.player-row:last-child { border-bottom:none; }
.player-row td { padding:10px 7px; text-align:center; font-size:13px; }
.player-row td.name-col { text-align:left; padding-left:14px; }
.p-name { font-size:14px; font-weight:700; color:#1a3a2a; }
.p-status { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
.p-status.active { color:#3d7a52; }
.p-status.done { color:#bbb; }
.pos { font-size:14px; font-weight:800; color:#c9a84c; margin-right:5px; }
.hs { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; font-size:13px; font-weight:600; color:#1a1a1a; }
.hs-empty  { color:#ccc; }
.hs-birdie { border:1.5px solid #1a1a1a; border-radius:50%; }
.hs-eagle  { border:1.5px solid #1a1a1a; border-radius:50%; outline:1.5px solid #1a1a1a; outline-offset:2px; }
.hs-bogey  { border:1.5px solid #1a1a1a; border-radius:2px; }
.tot { font-size:14px; font-weight:800; min-width:36px; }
.tot-under { color:#c0392b; }
.tot-even  { color:#27ae60; }
.tot-over  { color:#1a1a1a; }

/* NO ROUND */
.no-round-card { background:#ffffff; border-radius:14px; padding:48px 24px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
.no-round-card .icon { font-size:44px; margin-bottom:14px; }
.no-round-card h3 { font-size:20px; font-weight:700; color:#1a3a2a; margin-bottom:8px; }
.no-round-card p { font-size:14px; color:#888; line-height:1.6; }

/* ── GROUP SELECTION ── */
.card { background:#ffffff; border-radius:14px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,0.1); margin-bottom:16px; }
.section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#3d7a52; font-weight:700; margin-bottom:12px; }
.player-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.player-btn {
padding:13px 10px; background:#f5f0e8; border:2px solid transparent; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:14px; font-weight:600; color:#1a3a2a; cursor:pointer; text-align:center;
position:relative; -webkit-appearance:none; transition:all 0.15s;
}
.player-btn:active { background:#e8e0d0; }
.player-btn.selected { background:#1a3a2a; border-color:#1a3a2a; color:#f5f0e8; }
.player-btn.has-scores::after { content:‘●’; position:absolute; top:5px; right:8px; font-size:8px; color:#3d7a52; }
.player-btn.selected.has-scores::after { color:#c9a84c; }
.player-btn.disabled-btn { opacity:0.35; cursor:not-allowed; }

.sub-btn {
padding:13px 10px; background:transparent; border:2px solid #c9a84c; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:14px; font-weight:700; color:#c9a84c; cursor:pointer; text-align:center;
position:relative; -webkit-appearance:none; transition:all 0.15s;
}
.sub-btn:active { background:#fff8e8; }
.sub-btn.selected { background:#c9a84c; color:#1a3a2a; }
.sub-input-row { display:flex; gap:8px; align-items:center; margin-top:8px; grid-column:1/-1; }
.sub-input {
flex:1; padding:11px 12px; border:2px solid #c9a84c; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:14px; background:#fffdf5; color:#1a3a2a; outline:none; -webkit-appearance:none;
}
.sub-input:focus { border-color:#b8923e; }
.sub-add-btn {
padding:11px 16px; background:#c9a84c; color:#1a3a2a; border:none; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:14px; font-weight:700; cursor:pointer; -webkit-appearance:none; white-space:nowrap;
}
.sub-add-btn:active { background:#b8923e; }
.sub-tag {
display:inline-flex; align-items:center; gap:6px; background:#fff8e8; border:1.5px solid #c9a84c;
border-radius:20px; padding:5px 10px 5px 12px; font-size:13px; font-weight:600; color:#1a3a2a;
margin:4px 4px 0 0;
}
.sub-tag-remove { background:none; border:none; color:#c9a84c; font-size:16px; cursor:pointer; padding:0; line-height:1; font-weight:700; }
.sub-tags-wrap { grid-column:1/-1; display:flex; flex-wrap:wrap; margin-top:4px; min-height:0; }

.start-group-btn {
width:100%; padding:14px; background:#c9a84c; color:#1a3a2a; border:none; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:16px; font-weight:800; cursor:pointer; -webkit-appearance:none; margin-top:4px;
transition:background 0.15s;
}
.start-group-btn:active { background:#b8923e; }
.start-group-btn:disabled { opacity:0.3; cursor:not-allowed; }
.group-hint { font-size:12px; color:#aaa; text-align:center; margin-top:8px; }

/* ── GROUP SCORECARD ── */
.scorecard-header {
background:#1a3a2a; border-radius:12px 12px 0 0; padding:14px 16px 12px;
display:flex; align-items:center; justify-content:space-between;
}
.sc-title { font-size:18px; font-weight:800; color:#f5f0e8; }
.sc-date { font-size:12px; color:rgba(245,240,232,0.55); margin-top:2px; }
.sc-close-btn {
background:rgba(255,255,255,0.12); border:none; color:#f5f0e8; border-radius:8px;
padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; -webkit-appearance:none;
}

.scorecard-wrap {
overflow-x:auto; background:#ffffff; border-radius:0 0 12px 12px;
box-shadow:0 4px 20px rgba(0,0,0,0.14); margin-bottom:16px;
-webkit-overflow-scrolling:touch;
}
.sc-table { border-collapse:collapse; font-size:13px; width:100%; }

/* Column widths */
.sc-table .col-label { min-width:72px; width:72px; }
.sc-table .col-hole  { min-width:34px; width:34px; }
.sc-table .col-tot   { min-width:46px; width:46px; }

/* Header row - hole numbers */
.sc-table .row-holes th {
background:#1a3a2a; color:#f5f0e8; text-align:center;
padding:8px 4px; font-size:12px; font-weight:700; letter-spacing:0.04em;
border-right:1px solid rgba(255,255,255,0.08);
}
.sc-table .row-holes th.lbl-cell { text-align:left; padding-left:10px; }
.sc-table .row-holes th.tot-cell { background:#0f2419; }

/* Yardage rows */
.sc-table .row-yards td {
text-align:center; padding:5px 4px; font-size:11px; font-weight:600;
border-right:1px solid #e8e0d0; border-bottom:1px solid #e8e0d0;
}
.sc-table .row-yards td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; font-weight:700; }
.sc-table .row-yards.blue-row td { background:#ddeeff; color:#1a5fa8; }
.sc-table .row-yards.blue-row td.lbl-cell { background:#1a5fa8; color:#fff; }
.sc-table .row-yards.white-row td { background:#f9f9f9; color:#333; }
.sc-table .row-yards.white-row td.lbl-cell { background:#555; color:#fff; }

/* Par row */
.sc-table .row-par td {
background:#2d5a3d; color:#f5f0e8; text-align:center;
padding:6px 4px; font-size:13px; font-weight:700;
border-right:1px solid rgba(255,255,255,0.15); border-bottom:2px solid #1a3a2a;
}
.sc-table .row-par td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; }
.sc-table .row-par td.tot-cell { background:#1a3a2a; }

/* Hdcp row */
.sc-table .row-hdcp td {
background:#f0ebe0; color:#666; text-align:center;
padding:5px 4px; font-size:11px; font-weight:600;
border-right:1px solid #e8e0d0; border-bottom:2px solid #1a3a2a;
}
.sc-table .row-hdcp td.lbl-cell { text-align:left; padding-left:10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#888; }
.sc-table .row-hdcp td.tot-cell { background:#e8e0d0; }

/* Player rows */
.sc-table .row-player td {
text-align:center; padding:4px 3px;
border-right:1px solid #e8e0d0; border-bottom:1px solid #e8e0d0;
}
.sc-table .row-player:last-child td { border-bottom:none; }
.sc-table .row-player td.lbl-cell {
text-align:left; padding-left:10px; background:#fafaf8;
font-size:13px; font-weight:700; color:#1a3a2a; white-space:nowrap;
}
.sc-table .row-player td.tot-cell { background:#f5f0e8; font-size:13px; font-weight:800; }

/* Score cell button */
.score-cell-btn {
width:30px; height:28px; border-radius:6px; border:1.5px solid #e8e0d0;
background:#ffffff; font-size:13px; font-weight:600; color:#1a1a1a;
cursor:pointer; -webkit-appearance:none; display:inline-flex;
align-items:center; justify-content:center; transition:all 0.12s;
}
.score-cell-btn:active { transform:scale(0.92); }
.score-cell-btn.empty { color:#ccc; border-color:#eee; }
.score-cell-btn.under { background:rgba(192,57,43,0.1); color:#c0392b; border-color:rgba(192,57,43,0.25); font-weight:700; }
.score-cell-btn.even  { background:rgba(39,174,96,0.1);  color:#27ae60; border-color:rgba(39,174,96,0.25);  font-weight:700; }
.score-cell-btn.over  { background:#f5f5f5; color:#1a1a1a; border-color:#ddd; }

/* Player total */
.player-tot { font-size:13px; font-weight:800; }
.player-tot .vtp { font-size:11px; font-weight:700; display:block; margin-top:1px; }
.vtp-under { color:#c0392b; }
.vtp-even  { color:#27ae60; }
.vtp-over  { color:#1a1a1a; }

/* Finish group bar */
.finish-bar { background:#ffffff; border-radius:12px; padding:14px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.finish-bar-info { font-size:13px; color:#888; }
.finish-bar-info strong { color:#1a3a2a; font-size:14px; display:block; margin-bottom:2px; }
.btn-finish-group {
padding:12px 20px; background:#1a3a2a; color:#f5f0e8; border:none; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:14px; font-weight:700; cursor:pointer; -webkit-appearance:none; white-space:nowrap;
}
.btn-finish-group:active { background:#2d5a3d; }

/* ── SCORE POPOVER ── */
.popover-overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200;
display:flex; align-items:flex-end; justify-content:center;
opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.popover-overlay.open { opacity:1; pointer-events:all; }
.popover {
background:#ffffff; border-radius:20px 20px 0 0; padding:20px 20px 36px;
width:100%; max-width:400px;
transform:translateY(100%); transition:transform 0.25s ease;
}
.popover-overlay.open .popover { transform:translateY(0); }
.pop-title { font-size:13px; color:#888; text-align:center; margin-bottom:2px; }
.pop-sub { font-size:18px; font-weight:800; color:#1a3a2a; text-align:center; margin-bottom:16px; }
.pop-par { font-size:12px; color:#3d7a52; font-weight:600; text-align:center; margin-top:-12px; margin-bottom:16px; }
.pop-controls { display:flex; align-items:center; justify-content:center; gap:24px; margin-bottom:16px; }
.pop-btn {
width:56px; height:56px; border-radius:50%; border:2px solid #2d5a3d; background:transparent;
font-size:28px; color:#2d5a3d; cursor:pointer; display:flex; align-items:center;
justify-content:center; -webkit-appearance:none; font-weight:300;
}
.pop-btn:active { background:#1a3a2a; border-color:#1a3a2a; color:#fff; }
.pop-val { font-size:60px; font-weight:800; color:#1a3a2a; min-width:72px; text-align:center; line-height:1; }
.pop-label { text-align:center; font-size:14px; font-weight:600; min-height:20px; margin-bottom:16px; }
.pop-label.under { color:#c0392b; }
.pop-label.even  { color:#27ae60; }
.pop-label.over  { color:#1a1a1a; }
.pop-actions { display:flex; gap:10px; }
.pop-cancel {
padding:13px 18px; background:transparent; color:#1a3a2a; border:2px solid #e8e0d0;
border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:15px; font-weight:600; cursor:pointer; -webkit-appearance:none;
}
.pop-save {
flex:1; padding:13px; background:#1a3a2a; color:#f5f0e8; border:none; border-radius:10px;
font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:15px; font-weight:700; cursor:pointer; -webkit-appearance:none;
}
.pop-save:active { background:#2d5a3d; }
.pop-clear {
padding:13px 14px; background:transparent; color:#c0392b; border:2px solid #c0392b;
border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif;
font-size:13px; font-weight:600; cursor:pointer; -webkit-appearance:none;
}

/* ADMIN */
.admin-lock-card { background:#ffffff; border-radius:14px; padding:32px 22px; box-shadow:0 4px 20px rgba(0,0,0,0.1); text-align:center; }
.admin-lock-card h3 { font-size:20px; font-weight:700; color:#1a3a2a; margin-bottom:6px; }
.admin-lock-card p { font-size:14px; color:#888; margin-bottom:20px; }
.pw-input { width:100%; padding:13px 14px; border:2px solid #e8e0d0; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif; font-size:16px; text-align:center; letter-spacing:0.12em; outline:none; background:#f5f0e8; color:#1a3a2a; -webkit-appearance:none; margin-bottom:6px; }
.pw-input:focus { border-color:#3d7a52; }
.pw-input.error { border-color:#c0392b; }
.pw-error { color:#c0392b; font-size:13px; min-height:18px; margin-bottom:14px; }
.admin-panel { display:flex; flex-direction:column; gap:14px; }
.admin-card { background:#ffffff; border-radius:14px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
.admin-card h3 { font-size:16px; font-weight:700; color:#1a3a2a; margin-bottom:14px; }
.field-label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#888; font-weight:600; margin-bottom:5px; margin-top:12px; }
.field-label:first-of-type { margin-top:0; }
.admin-select { width:100%; padding:11px 12px; border:2px solid #e8e0d0; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif; font-size:15px; background:#f5f0e8; color:#1a3a2a; outline:none; -webkit-appearance:none; }
.admin-select:focus { border-color:#3d7a52; }
.active-round-box { background:#f5f0e8; border-radius:10px; padding:12px 14px; margin-bottom:14px; }
.arb-label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#888; margin-bottom:4px; }
.arb-val { font-size:16px; font-weight:700; color:#1a3a2a; }
.arb-date { font-size:12px; color:#888; margin-top:2px; }
.btn-full { width:100%; margin-top:14px; padding:14px; background:#1a3a2a; color:#f5f0e8; border:none; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif; font-size:15px; font-weight:700; cursor:pointer; -webkit-appearance:none; }
.btn-full:active { background:#2d5a3d; }
.btn-danger-full { width:100%; margin-top:10px; padding:13px; background:transparent; color:#c0392b; border:2px solid #c0392b; border-radius:10px; font-family:-apple-system,BlinkMacSystemFont,‘Segoe UI’,Helvetica,Arial,sans-serif; font-size:15px; font-weight:700; cursor:pointer; -webkit-appearance:none; }
.btn-danger-full:active { background:#c0392b; color:#fff; }
.btn-danger-full:disabled { opacity:0.3; }
.admin-msg { font-size:13px; text-align:center; margin-top:10px; min-height:18px; }
.admin-msg.ok  { color:#27ae60; }
.admin-msg.err { color:#c0392b; }

/* TOAST */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a3a2a; color:#f5f0e8; font-size:13px; font-weight:600; padding:10px 22px; border-radius:22px; z-index:500; transition:transform 0.3s ease; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.25); }
.toast.show { transform:translateX(-50%) translateY(0); }

.empty-state { text-align:center; padding:40px 20px; color:#aaa; }
.empty-state .ei { font-size:40px; margin-bottom:10px; }
.empty-state p { font-size:14px; line-height:1.5; }
.scoreboard-wrap::-webkit-scrollbar { height:4px; }
.scoreboard-wrap::-webkit-scrollbar-thumb { background:#3d7a52; border-radius:2px; }
.scorecard-wrap::-webkit-scrollbar { height:4px; }

<script>
const SUPABASE_URL = 'https://vtnxjheizurqardgreeq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0bnhqaGVpenVycWFyZGdyZWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzA2MTIsImV4cCI6MjA5MzY0NjYxMn0.0tEGcXoVMZme75ryvYUjBg37r_9rsV0lLmULqm7c32w';

const COURSE_DATA = {

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let activeSeason     = null;
let activeRound      = null;  // the display round
let activeCourse     = null;
let allActiveRounds  = [];    // all rounds with status=active
let closedRounds     = [];    // all rounds with status=closed
let players          = [];
let scoreMap         = {};
let adminUnlocked    = false;

// Group entry state
let groupMode      = false;  // false = player select, true = scorecard
let selectedGroup  = [];     // array of player ids
let groupScores    = {};     // { playerId: { hole: strokes } }

// Popover state
let popPlayerId = null;
let popHole     = null;
let popStrokes  = 0;

const pars       = () => activeCourse ? activeCourse.pars : [];
const totalPar   = () => pars().reduce((a,b)=>a+b,0);
const courseData = () => activeCourse ? (COURSE_DATA[activeCourse.name] || null) : null;

function vtpLabel(d) { return d===0?'E':d>0?'+'+d:String(d); }
function vtpClass(d) { return d<0?'under':d===0?'even':'over'; }
function fmtDate(s) {
  const d = new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const { data: seasons } = await sb.from('seasons').select('*').eq('active',true).limit(1);
    activeSeason = seasons?.[0] || null;
    const { data: pl } = await sb.from('players').select('*').eq('active',true).order('name');
    players = pl || [];
    if (activeSeason) {
      await loadAllRounds();
    }
    subscribeRealtime();
    updateBadge();
    renderAll();
  } catch(e) { console.error('Init error:',e); }
  finally { document.getElementById('loadingOverlay').classList.add('hidden'); }
}

async function loadAllRounds() {
  if (!activeSeason) return;
  // Load all active rounds
  const { data: active } = await sb.from('rounds')
    .select('*, courses(*)')
    .eq('season_id', activeSeason.id)
    .eq('status','active')
    .order('date', { ascending: false });
  allActiveRounds = active || [];

  // Load all closed rounds
  const { data: closed } = await sb.from('rounds')
    .select('*, courses(*)')
    .eq('season_id', activeSeason.id)
    .eq('status','closed')
    .order('date', { ascending: false });
  closedRounds = closed || [];

  // Set display round from season's display_round_id
  const displayId = activeSeason.display_round_id;
  if (displayId) {
    const found = allActiveRounds.find(r=>r.id===displayId);
    if (found) { activeRound=found; activeCourse=found.courses; }
    else { activeRound=null; activeCourse=null; }
  } else {
    activeRound=null; activeCourse=null;
  }
  await loadScores();
}

async function loadScores() {
  if (!activeRound) { scoreMap={}; return; }
  const { data } = await sb.from('scores').select('*').eq('round_id',activeRound.id);
  scoreMap = {};
  (data||[]).forEach(s => {
    if (!scoreMap[s.player_id]) scoreMap[s.player_id]={};
    scoreMap[s.player_id][s.hole] = s.strokes;
  });
  // Sync into groupScores if group is active
  if (groupMode && selectedGroup.length>0) {
    selectedGroup.forEach(pid => {
      groupScores[pid] = { ...(scoreMap[pid]||{}) };
    });
  }
}

function subscribeRealtime() {
  sb.channel('rcc-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'scores'}, async()=>{
      await loadScores();
      renderScoreboard();
      if (groupMode) renderGroupScorecard();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'rounds'}, async()=>{
      await reloadRound();
    })
    .subscribe();
}

async function reloadRound() {
  if (!activeSeason) return;
  // Refresh season to get latest display_round_id
  const { data: seasons } = await sb.from('seasons').select('*').eq('id', activeSeason.id).limit(1);
  if (seasons?.[0]) activeSeason = seasons[0];
  await loadAllRounds();
  updateBadge(); renderAll();
}

function updateBadge() {
  const b = document.getElementById('roundBadge');
  if (activeRound) { b.textContent='Live'; b.className='round-badge live'; }
  else if (allActiveRounds.length>0) { b.textContent='No Display'; b.className='round-badge no-round'; }
  else { b.textContent='No Round'; b.className='round-badge no-round'; }
}

function renderAll() { renderScoreboard(); renderEntry(); renderAdmin(); }

// ── SCOREBOARD ────────────────────────────────────────────────────────────────
function renderScoreboard() {
  const el = document.getElementById('scoreboardContent');
  if (!activeRound||!activeCourse) {
    el.innerHTML=`<div class="no-round-card"><div class="icon">⛳</div><h3>No Active Round</h3><p>Head to the Admin tab to start this week's round.</p></div>`;
    return;
  }
  const withScores = players.filter(p=>scoreMap[p.id]&&Object.keys(scoreMap[p.id]).length>0);
  const rows = withScores.map(p=>{
    const holes=scoreMap[p.id]||{};
    const arr=pars().map((_,i)=>holes[i+1]??null);
    const played=arr.filter(s=>s!==null);
    const strokes=played.reduce((a,b)=>a+b,0);
    const parPlayed=pars().slice(0,played.length).reduce((a,b)=>a+b,0);
    const diff=played.length>0?strokes-parPlayed:null;
    return{p,arr,played,strokes,diff};
  }).sort((a,b)=>{
    if(a.diff===null&&b.diff===null)return 0;
    if(a.diff===null)return 1; if(b.diff===null)return -1;
    if(a.diff!==b.diff)return a.diff-b.diff;
    return b.played.length-a.played.length;
  });

  let parCells=`<tr class="par-row"><td class="name-col">Par</td>`;
  pars().forEach(p=>parCells+=`<td>${p}</td>`);
  parCells+=`<td>${totalPar()}</td><td>—</td></tr>`;

  let body='';
  if(rows.length===0){
    body=`<tr><td colspan="12"><div class="empty-state"><div class="ei">⛳</div><p>No scores yet.</p></div></td></tr>`;
  } else {
    rows.forEach((row,i)=>{
      const hp=row.played.length;
      const stTxt=hp===9?'F':hp>0?`Thru ${hp}`:'—';
      const stCls=hp===9?'done':hp>0?'active':'';
      let cells='';
      for(let h=0;h<9;h++){
        const s=row.arr[h];
        if(s===null){ cells+=`<td><span class="hs hs-empty">·</span></td>`; }
        else {
          const d=s-pars()[h];
          let hsCls='hs';
          if(d<=-2) hsCls+=' hs-eagle';
          else if(d===-1) hsCls+=' hs-birdie';
          else if(d===1) hsCls+=' hs-bogey';
          cells+=`<td><span class="${hsCls}">${s}</span></td>`;
        }
      }
      const tot=hp>0?row.strokes:'—';
      const diff=row.diff!==null?vtpLabel(row.diff):'—';
      const dc=row.diff!==null?`tot-${vtpClass(row.diff)}`:'';
      body+=`<tr class="player-row">
        <td class="name-col"><div><span class="pos">${i+1}</span><span class="p-name">${row.p.name}</span></div><div class="p-status ${stCls}">${stTxt}</div></td>
        ${cells}<td class="tot">${tot}</td><td class="tot ${dc}">${diff}</td>
      </tr>`;
    });
  }
  el.innerHTML=`
    <div class="round-info">
      <div><div class="round-course">Boulder Pointe — ${activeCourse.name}</div><div class="round-date">${fmtDate(activeRound.date)}</div></div>
      <div><div class="round-players-num">${withScores.length}</div><div class="round-players-lbl">Playing</div></div>
    </div>
    <div class="scoreboard-wrap">
      <table class="scoreboard-table">
        <thead><tr>
          <th class="name-col">#&nbsp; Player</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
          <th>TOT</th><th>+/-</th>
        </tr></thead>
        <tbody>${parCells}</tbody><tbody>${body}</tbody>
      </table>
    </div>`;
}

// ── ENTRY ─────────────────────────────────────────────────────────────────────
function renderEntry() {
  const el = document.getElementById('entryContent');
  if (!activeRound||!activeCourse) {
    el.innerHTML=`<div class="no-round-card"><div class="icon">✏️</div><h3>No Active Round</h3><p>An admin needs to start this week's round first.</p></div>`;
    groupMode=false; selectedGroup=[];
    return;
  }
  if (groupMode) { renderGroupScorecard(); return; }
  renderPlayerSelect();
}

// Sub state
let showSubInput = false;
let subs = []; // { id, name } — temp only, not in players array

function allSelectablePlayers() {
  return [...players, ...subs];
}

function renderPlayerSelect() {
  const el = document.getElementById('entryContent');
  const all = allSelectablePlayers();
  const count = selectedGroup.length;
  const maxed = count >= 4;

  let btns='';
  all.forEach(p=>{
    const isSelected = selectedGroup.includes(p.id);
    const isSub = subs.some(s=>s.id===p.id);
    const has = !isSub && scoreMap[p.id]&&Object.keys(scoreMap[p.id]).length>0;
    const disabled = maxed && !isSelected;
    if(isSub){
      btns+=`<button class="player-btn ${isSelected?'selected':''} ${disabled?'disabled-btn':''}"
        onclick="togglePlayer('${p.id}')" ${disabled?'disabled':''}>${p.name} <span style="font-size:10px;opacity:0.6">(Sub)</span></button>`;
    } else {
      btns+=`<button class="player-btn ${isSelected?'selected':''} ${has?'has-scores':''} ${disabled?'disabled-btn':''}"
        onclick="togglePlayer('${p.id}')" ${disabled?'disabled':''}>${p.name}</button>`;
    }
  });

  // Sub button
  const subDisabled = maxed && !showSubInput ? 'disabled' : '';
  btns+=`<button class="sub-btn ${showSubInput?'selected':''}" onclick="toggleSubInput()" ${subDisabled}>+ Add Sub</button>`;

  const subInputHtml = showSubInput ? `
    <div class="sub-input-row">
      <input class="sub-input" id="subNameInput" type="text" placeholder="Sub's name" maxlength="40"
        onkeydown="if(event.key==='Enter')addSub()">
      <button class="sub-add-btn" onclick="addSub()">Add</button>
    </div>` : '';

  el.innerHTML=`
    <div class="card">
      <div class="section-label">Select Your Group (up to 4)</div>
      <div class="player-grid" id="playerGrid">
        ${btns}
        ${subInputHtml}
      </div>
    </div>
    <button class="start-group-btn" onclick="startGroupScorecard()" ${count===0?'disabled':''}>
      Start Scorecard${count>0?' ('+count+' player'+(count>1?'s':'')+')':''}
    </button>
    <div class="group-hint">${count===0?'Tap players to select your group':'Tap Start Scorecard to begin entering scores'}</div>`;

  if(showSubInput) setTimeout(()=>{ const i=document.getElementById('subNameInput'); if(i) i.focus(); },50);
}

function toggleSubInput() {
  showSubInput = !showSubInput;
  renderPlayerSelect();
}

function addSub() {
  const input = document.getElementById('subNameInput');
  if(!input) return;
  const name = input.value.trim();
  if(!name) return;
  if(selectedGroup.length>=4) return;
  const id = 'sub_' + Date.now();
  subs.push({ id, name });
  selectedGroup.push(id);
  showSubInput = false;
  renderPlayerSelect();
}

function togglePlayer(id) {
  if (selectedGroup.includes(id)) {
    selectedGroup = selectedGroup.filter(p=>p!==id);
  } else if (selectedGroup.length<4) {
    selectedGroup.push(id);
  }
  renderPlayerSelect();
}

function startGroupScorecard() {
  if (selectedGroup.length===0) return;
  groupScores={};
  selectedGroup.forEach(pid=>{
    groupScores[pid] = { ...(scoreMap[pid]||{}) };
  });
  groupMode=true;
  showSubInput=false;
  renderGroupScorecard();
}

function renderGroupScorecard() {
  const el = document.getElementById('entryContent');
  const cd  = courseData();
  if (!cd) return;

  const groupPlayers = selectedGroup.map(id=>allSelectablePlayers().find(p=>p.id===id)).filter(Boolean);

  // Build table
  let hdrCells = `<th class="lbl-cell col-label">HOLE</th>`;
  for(let h=1;h<=9;h++) hdrCells+=`<th class="col-hole">${h}</th>`;
  hdrCells+=`<th class="tot-cell col-tot">TOT</th>`;

  const blueTotal  = cd.blue.reduce((a,b)=>a+b,0);
  const whiteTotal = cd.white.reduce((a,b)=>a+b,0);

  let blueCells  = `<td class="lbl-cell">BLUE</td>`;
  let whiteCells = `<td class="lbl-cell">WHITE</td>`;
  let parCells   = `<td class="lbl-cell">PAR</td>`;
  let hdcpCells  = `<td class="lbl-cell">HDCP</td>`;

  for(let h=0;h<9;h++){
    blueCells  += `<td>${cd.blue[h]}</td>`;
    whiteCells += `<td>${cd.white[h]}</td>`;
    parCells   += `<td>${cd.par[h]}</td>`;
    hdcpCells  += `<td>${cd.hdcp[h]}</td>`;
  }
  blueCells  += `<td>${blueTotal}</td>`;
  whiteCells += `<td>${whiteTotal}</td>`;
  parCells   += `<td>${cd.par.reduce((a,b)=>a+b,0)}</td>`;
  hdcpCells  += `<td></td>`;

  // Player rows
  let playerRows='';
  groupPlayers.forEach(p=>{
    const gs = groupScores[p.id]||{};
    let cells='';
    let totalStrokes=0, holesPlayed=0, totalParPlayed=0;

    for(let h=1;h<=9;h++){
      const s = gs[h]??null;
      const par = cd.par[h-1];
      let btnCls='score-cell-btn empty', display='·';
      if(s!==null){
        const d=s-par;
        btnCls=`score-cell-btn ${vtpClass(d)}`;
        display=String(s);
        totalStrokes+=s; holesPlayed++; totalParPlayed+=par;
      }
      cells+=`<td><button class="${btnCls}" onclick="openPopover('${p.id}',${h})">${display}</button></td>`;
    }

    let totDisplay='—', vtpDisplay='', vtpCls='';
    if(holesPlayed>0){
      const diff=totalStrokes-totalParPlayed;
      totDisplay=String(totalStrokes);
      vtpDisplay=vtpLabel(diff);
      vtpCls=`vtp-${vtpClass(diff)}`;
    }

    playerRows+=`<tr class="row-player">
      <td class="lbl-cell">${p.name}</td>
      ${cells}
      <td class="tot-cell">
        <div class="player-tot">${totDisplay}<span class="vtp ${vtpCls}">${vtpDisplay}</span></div>
      </td>
    </tr>`;
  });

  // Count completed holes across group
  const totalCells = groupPlayers.length * 9;
  const filledCells = groupPlayers.reduce((sum,p)=>sum+Object.keys(groupScores[p.id]||{}).length,0);

  el.innerHTML=`
    <div class="scorecard-header">
      <div>
        <div class="sc-title">Boulder Pointe — ${activeCourse.name}</div>
        <div class="sc-date">${fmtDate(activeRound.date)}</div>
      </div>
      <button class="sc-close-btn" onclick="exitGroupScorecard()">← Back</button>
    </div>
    <div class="scorecard-wrap">
      <table class="sc-table">
        <thead><tr class="row-holes">${hdrCells}</tr></thead>
        <tbody>
          <tr class="row-yards blue-row">${blueCells}</tr>
          <tr class="row-yards white-row">${whiteCells}</tr>
          <tr class="row-par">${parCells}</tr>
          <tr class="row-hdcp">${hdcpCells}</tr>
          ${playerRows}
        </tbody>
      </table>
    </div>
    <div class="finish-bar">
      <div class="finish-bar-info">
        <strong>${groupPlayers.map(p=>p.name.split(' ')[0]).join(', ')}</strong>
        ${filledCells} of ${totalCells} holes entered
      </div>
      <button class="btn-finish-group" onclick="finishGroup()">Save & Finish ✓</button>
    </div>`;
}

function exitGroupScorecard() {
  groupMode=false;
  selectedGroup=[];
  groupScores={};
  subs=[];
  showSubInput=false;
  renderEntry();
}

// ── POPOVER ───────────────────────────────────────────────────────────────────
function openPopover(playerId, hole) {
  popPlayerId = playerId;
  popHole     = hole;
  const par   = pars()[hole-1];
  const existing = (groupScores[playerId]||{})[hole] ?? null;
  popStrokes  = existing !== null ? existing : par;

  const player = players.find(p=>p.id===playerId);
  document.getElementById('popTitle').textContent = `Hole ${hole}`;
  document.getElementById('popSub').textContent   = player ? player.name : '';
  document.getElementById('popPar').textContent   = `Par ${par}`;
  updatePopoverDisplay();
  document.getElementById('popoverOverlay').classList.add('open');
}

function updatePopoverDisplay() {
  const par = pars()[popHole-1];
  document.getElementById('popVal').textContent = popStrokes;
  const d = popStrokes - par;
  const lbl = document.getElementById('popLabel');
  if(d===0){ lbl.textContent='Even par'; lbl.className='pop-label even'; }
  else if(d<0){
    const names=['','Birdie','Eagle','Albatross'];
    lbl.textContent=names[Math.abs(d)]||`${Math.abs(d)} under`;
    lbl.className='pop-label under';
  } else {
    const names=['','Bogey','Double Bogey','Triple Bogey'];
    lbl.textContent=names[d]||`+${d}`;
    lbl.className='pop-label over';
  }
}

function popAdj(delta) {
  popStrokes = Math.max(1, popStrokes+delta);
  updatePopoverDisplay();
}

async function savePopover() {
  if (!groupScores[popPlayerId]) groupScores[popPlayerId]={};
  groupScores[popPlayerId][popHole] = popStrokes;
  // Only upsert to Supabase for real players, not subs
  if (!popPlayerId.startsWith('sub_')) {
    await sb.from('scores').upsert(
      { round_id:activeRound.id, player_id:popPlayerId, hole:popHole, strokes:popStrokes },
      { onConflict:'round_id,player_id,hole' }
    );
  }
  dismissPopover();
  renderGroupScorecard();
}

async function clearScore() {
  if (groupScores[popPlayerId]) delete groupScores[popPlayerId][popHole];
  if (!popPlayerId.startsWith('sub_')) {
    await sb.from('scores')
      .delete()
      .eq('round_id', activeRound.id)
      .eq('player_id', popPlayerId)
      .eq('hole', popHole);
  }
  dismissPopover();
  renderGroupScorecard();
}

function dismissPopover() {
  document.getElementById('popoverOverlay').classList.remove('open');
}

function closePopover(e) {
  if (e.target===document.getElementById('popoverOverlay')) dismissPopover();
}

function finishGroup() {
  toast('Scores saved! 🏌️');
  exitGroupScorecard();
  switchTab('scoreboard');
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin() {
  const el = document.getElementById('adminContent');
  if (!adminUnlocked) {
    el.innerHTML=`
      <div class="admin-lock-card">
        <h3>Admin Access</h3><p>Enter the admin password to continue.</p>
        <input class="pw-input" id="pwInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
        <div class="pw-error" id="pwError"></div>
        <button class="btn-full" onclick="checkPw()">Unlock</button>
      </div>`;
    return;
  }
  el.innerHTML=`<div class="admin-panel" id="adminPanel"><div style="text-align:center;padding:20px;font-size:13px;color:#aaa;">Loading...</div></div>`;
  loadAdminPanel();
}

async function loadAdminPanel() {
  const { data: courses } = await sb.from('courses').select('*').order('name');
  const panel = document.getElementById('adminPanel');
  if (!panel) return;
  const opts = (courses||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const today = new Date().toISOString().slice(0,10);

  // Display round selector — all active rounds
  const displayOpts = allActiveRounds.map(r=>
    `<option value="${r.id}" ${activeRound&&r.id===activeRound.id?'selected':''}>
      ${r.courses.name} — ${fmtDate(r.date)}
    </option>`
  ).join('');
  const displaySelector = allActiveRounds.length>0
    ? `<select class="admin-select" id="displayRoundSelect">${displayOpts}</select>
       <button class="btn-full" onclick="setDisplayRound()" style="margin-top:10px;">Set Display Round</button>
       <div class="admin-msg" id="displayMsg"></div>`
    : `<div style="font-size:13px;color:#aaa;padding:8px 0;">No active rounds yet.</div>`;

  // Active rounds list
  const activeRoundsList = allActiveRounds.length>0
    ? allActiveRounds.map(r=>`
        <div class="active-round-box" style="margin-bottom:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div class="arb-val">Boulder Pointe — ${r.courses.name}</div>
              <div class="arb-date">${fmtDate(r.date)} ${activeRound&&r.id===activeRound.id?'<span style="color:#27ae60;font-weight:700;">● Display</span>':''}</div>
            </div>
            <button class="btn-danger-full" style="width:auto;margin:0;padding:8px 14px;font-size:13px;" onclick="closeRound('${r.id}')">Close</button>
          </div>
        </div>`).join('')
    : `<div style="font-size:13px;color:#aaa;padding:8px 0;">No active rounds.</div>`;

  // Closed rounds list
  const closedRoundsList = closedRounds.length>0
    ? closedRounds.map(r=>`
        <div class="active-round-box" style="margin-bottom:10px;opacity:0.75;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div class="arb-val" style="font-size:14px;">Boulder Pointe — ${r.courses.name}</div>
              <div class="arb-date">${fmtDate(r.date)}</div>
            </div>
            <button class="btn-full" style="width:auto;margin:0;padding:8px 14px;font-size:13px;" onclick="reactivateRound('${r.id}')">Reactivate</button>
          </div>
        </div>`).join('')
    : `<div style="font-size:13px;color:#aaa;padding:8px 0;">No closed rounds.</div>`;

  panel.innerHTML=`
    <div class="admin-card">
      <h3>Start New Round</h3>
      <label class="field-label">Course</label>
      <select class="admin-select" id="adminCourse">${opts}</select>
      <label class="field-label">Date</label>
      <input type="date" class="admin-select" id="adminDate" value="${today}">
      <button class="btn-full" onclick="startRound()">Start Round</button>
      <div class="admin-msg" id="startMsg"></div>
    </div>
    <div class="admin-card">
      <h3>Display Round</h3>
      <div class="field-label" style="margin-top:0;">Shown on scoreboard &amp; score entry</div>
      ${displaySelector}
    </div>
    <div class="admin-card">
      <h3>Active Rounds</h3>
      ${activeRoundsList}
    </div>
    <div class="admin-card">
      <h3>Closed Rounds</h3>
      ${closedRoundsList}
    </div>`;
}

function checkPw() {
  const input=document.getElementById('pwInput'), err=document.getElementById('pwError');
  if(input.value===ADMIN_PW){ adminUnlocked=true; renderAdmin(); }
  else {
    input.classList.add('error'); err.textContent='Incorrect password.';
    setTimeout(()=>{input.classList.remove('error');err.textContent='';},2000);
  }
}

async function startRound() {
  const courseId=document.getElementById('adminCourse').value;
  const date=document.getElementById('adminDate').value;
  const msg=document.getElementById('startMsg');
  if(!courseId||!date){msg.textContent='Pick a course and date.';msg.className='admin-msg err';return;}
  const{error}=await sb.from('rounds').insert({season_id:activeSeason.id,course_id:courseId,date,status:'active'});
  if(error){msg.textContent='Error starting round.';msg.className='admin-msg err';}
  else{msg.textContent='Round started!';msg.className='admin-msg ok';await reloadRound();loadAdminPanel();toast('Round started ⛳');}
}

async function setDisplayRound() {
  const id = document.getElementById('displayRoundSelect')?.value;
  const msg = document.getElementById('displayMsg');
  if(!id){return;}
  const{error}=await sb.from('seasons').update({display_round_id:id}).eq('id',activeSeason.id);
  if(error){msg.textContent='Error setting display round.';msg.className='admin-msg err';}
  else{
    activeSeason.display_round_id=id;
    msg.textContent='Display round updated!';msg.className='admin-msg ok';
    await reloadRound();loadAdminPanel();toast('Display round set ⛳');
  }
}

async function closeRound(roundId) {
  const msg = document.getElementById('closeMsg');
  const{error}=await sb.from('rounds').update({status:'closed'}).eq('id',roundId);
  if(error){toast('Error closing round.');}
  else{
    // If closed round was the display round, clear display_round_id
    if(activeSeason.display_round_id===roundId){
      await sb.from('seasons').update({display_round_id:null}).eq('id',activeSeason.id);
      activeSeason.display_round_id=null;
    }
    await reloadRound();loadAdminPanel();toast('Round closed.');
  }
}

async function reactivateRound(roundId) {
  const{error}=await sb.from('rounds').update({status:'active'}).eq('id',roundId);
  if(error){toast('Error reactivating round.');}
  else{await reloadRound();loadAdminPanel();toast('Round reactivated ⛳');}
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  const tabs=['scoreboard','entry','admin'];
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  tabs.forEach(v=>document.getElementById(`view-${v}`).classList.toggle('active',v===tab));
}

init();
</script>
