<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RCC Golf League</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
background: #f5f0e8;
color: #1a3a2a;
min-height: 100vh;
overflow-x: hidden;
}

/* LOADING */
#loadingOverlay {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: #1a3a2a;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 999;
transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
font-size: 28px;
font-weight: 800;
color: #f5f0e8;
margin-bottom: 4px;
letter-spacing: 0.02em;
}
.loading-logo span { color: #c9a84c; }
.loading-sub {
font-size: 11px;
color: rgba(245,240,232,0.4);
letter-spacing: 0.14em;
text-transform: uppercase;
margin-bottom: 28px;
}
.spinner {
width: 26px; height: 26px;
border: 2.5px solid rgba(255,255,255,0.12);
border-top-color: #c9a84c;
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* HEADER */
#appHeader {
background: #1a3a2a;
padding: 16px 16px 0 16px;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 2px 12px rgba(0,0,0,0.35);
}
.header-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.league-name {
font-size: 22px;
font-weight: 800;
color: #f5f0e8;
letter-spacing: 0.01em;
}
.league-name span { color: #c9a84c; }
.round-badge {
font-size: 11px;
font-weight: 600;
padding: 4px 10px;
border-radius: 20px;
letter-spacing: 0.07em;
text-transform: uppercase;
background: #3d7a52;
color: #f5f0e8;
}
.round-badge.live::before {
content: ’● ’;
color: #ff4444;
animation: pulse 1.4s infinite;
}
.round-badge.no-round {
background: rgba(255,255,255,0.1);
color: rgba(255,255,255,0.35);
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* TABS */
.tabs {
display: flex;
gap: 0;
border-bottom: none;
}
.tab-btn {
flex: 1;
padding: 11px 6px;
background: transparent;
border: none;
border-bottom: 3px solid transparent;
color: rgba(255,255,255,0.45);
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 12px;
font-weight: 700;
letter-spacing: 0.05em;
text-transform: uppercase;
cursor: pointer;
transition: color 0.2s, border-color 0.2s;
-webkit-appearance: none;
}
.tab-btn.active {
color: #c9a84c;
border-bottom: 3px solid #c9a84c;
}

/* MAIN */
.main { max-width: 700px; margin: 0 auto; padding: 18px 14px 90px; }
.view { display: none; }
.view.active { display: block; }

/* ROUND INFO BAR */
.round-info {
background: #2d5a3d;
border-radius: 12px;
padding: 12px 16px;
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 16px;
box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.round-course {
font-size: 16px;
font-weight: 700;
color: #f5f0e8;
margin-bottom: 3px;
}
.round-date { font-size: 12px; color: rgba(245,240,232,0.6); }
.round-players-num {
font-size: 26px;
font-weight: 800;
color: #c9a84c;
line-height: 1;
text-align: right;
}
.round-players-lbl {
font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.08em;
color: rgba(245,240,232,0.55);
text-align: right;
}

/* SCOREBOARD TABLE */
.scoreboard-wrap {
overflow-x: auto;
border-radius: 12px;
box-shadow: 0 4px 20px rgba(0,0,0,0.14);
background: #ffffff;
-webkit-overflow-scrolling: touch;
}
.scoreboard-table {
width: 100%;
min-width: 540px;
border-collapse: collapse;
font-size: 13px;
}
.scoreboard-table thead { background: #1a3a2a; }
.scoreboard-table thead th {
padding: 10px 7px;
font-size: 11px;
font-weight: 600;
letter-spacing: 0.06em;
text-align: center;
color: #f5f0e8;
}
.scoreboard-table thead th.name-col {
text-align: left;
padding-left: 14px;
min-width: 130px;
}
.par-row td {
background: #3d7a52;
color: #f5f0e8;
font-size: 12px;
font-weight: 600;
text-align: center;
padding: 6px 7px;
border-bottom: 2px solid #1a3a2a;
}
.par-row td.name-col {
text-align: left;
padding-left: 14px;
font-size: 11px;
letter-spacing: 0.07em;
text-transform: uppercase;
color: rgba(245,240,232,0.75);
}
.player-row { border-bottom: 1px solid #e8e0d0; }
.player-row:last-child { border-bottom: none; }
.player-row td { padding: 10px 7px; text-align: center; font-size: 13px; }
.player-row td.name-col { text-align: left; padding-left: 14px; }
.p-name { font-size: 14px; font-weight: 700; color: #1a3a2a; }
.p-status { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.p-status.active { color: #3d7a52; }
.p-status.done { color: #bbb; }
.pos { font-size: 14px; font-weight: 800; color: #c9a84c; margin-right: 5px; }

.hs {
display: inline-flex;
align-items: center;
justify-content: center;
width: 28px; height: 24px;
border-radius: 5px;
font-size: 13px;
font-weight: 600;
}
.hs-under { background: rgba(192,57,43,0.12); color: #c0392b; font-weight: 700; }
.hs-even  { background: rgba(39,174,96,0.12);  color: #27ae60; font-weight: 700; }
.hs-over  { color: #1a1a1a; }
.hs-empty { color: #ccc; }

.tot { font-size: 14px; font-weight: 800; min-width: 36px; }
.tot-under { color: #c0392b; }
.tot-even  { color: #27ae60; }
.tot-over  { color: #1a1a1a; }

/* NO ROUND */
.no-round-card {
background: #ffffff;
border-radius: 14px;
padding: 48px 24px;
text-align: center;
box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.no-round-card .icon { font-size: 44px; margin-bottom: 14px; }
.no-round-card h3 { font-size: 20px; font-weight: 700; color: #1a3a2a; margin-bottom: 8px; }
.no-round-card p { font-size: 14px; color: #888; line-height: 1.6; }

/* PLAYER SELECT */
.card {
background: #ffffff;
border-radius: 14px;
padding: 18px;
box-shadow: 0 4px 20px rgba(0,0,0,0.1);
margin-bottom: 16px;
}
.section-label {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.1em;
color: #3d7a52;
font-weight: 700;
margin-bottom: 12px;
}
.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.player-btn {
padding: 13px 10px;
background: #f5f0e8;
border: 2px solid transparent;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 14px;
font-weight: 600;
color: #1a3a2a;
cursor: pointer;
text-align: center;
position: relative;
-webkit-appearance: none;
transition: background 0.15s, border-color 0.15s;
}
.player-btn:active { background: #e8e0d0; }
.player-btn.has-scores::after {
content: ‘●’;
position: absolute;
top: 5px; right: 8px;
font-size: 8px;
color: #3d7a52;
}

/* CHANGE PLAYER BAR */
.change-bar {
display: none;
align-items: center;
justify-content: space-between;
background: #ffffff;
border-radius: 10px;
padding: 11px 14px;
margin-bottom: 14px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.change-bar.visible { display: flex; }
.change-bar-lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.change-bar-name { font-size: 15px; font-weight: 700; color: #1a3a2a; }
.change-link {
font-size: 13px;
color: #3d7a52;
background: none;
border: none;
cursor: pointer;
text-decoration: underline;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-weight: 600;
-webkit-appearance: none;
}

/* HOLE ENTRY */
.hole-card { display: none; background: #ffffff; border-radius: 14px; padding: 22px 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.hole-card.visible { display: block; }

.hole-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.hole-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
.hole-num { font-size: 52px; font-weight: 800; color: #1a3a2a; line-height: 1; }
.par-badge {
background: #2d5a3d;
color: #f5f0e8;
padding: 7px 16px;
border-radius: 20px;
font-size: 13px;
font-weight: 600;
letter-spacing: 0.05em;
margin-top: 8px;
}

.hole-dots { display: flex; gap: 6px; align-items: center; margin-bottom: 20px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #e8e0d0; transition: all 0.2s; }
.dot.done { background: #3d7a52; }
.dot.current { background: #c9a84c; width: 11px; height: 11px; }
.dot.under { background: #c0392b; }

.strokes-row { display: flex; align-items: center; justify-content: center; gap: 24px; margin: 20px 0 8px; }
.stroke-btn {
width: 62px; height: 62px;
border-radius: 50%;
border: 2px solid #2d5a3d;
background: transparent;
font-size: 30px;
font-weight: 300;
color: #2d5a3d;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
-webkit-appearance: none;
transition: background 0.15s, color 0.15s;
}
.stroke-btn:active { background: #1a3a2a; border-color: #1a3a2a; color: #f5f0e8; }
.stroke-val { font-size: 64px; font-weight: 800; color: #1a3a2a; min-width: 80px; text-align: center; line-height: 1; }

.stroke-label { text-align: center; font-size: 14px; font-weight: 600; min-height: 20px; margin-bottom: 6px; }
.stroke-label.under { color: #c0392b; }
.stroke-label.even  { color: #27ae60; }
.stroke-label.over  { color: #1a1a1a; }

.running-bar {
background: #f5f0e8;
border-radius: 10px;
padding: 12px;
display: flex;
justify-content: space-around;
margin-bottom: 20px;
}
.run-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.run-val { font-size: 22px; font-weight: 800; color: #1a3a2a; }
.run-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; }

.action-row { display: flex; gap: 10px; }
.btn-back {
padding: 14px 18px;
background: transparent;
color: #1a3a2a;
border: 2px solid #e8e0d0;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
font-weight: 600;
cursor: pointer;
-webkit-appearance: none;
}
.btn-back:disabled { opacity: 0.3; }
.btn-next {
flex: 1;
padding: 14px;
background: #1a3a2a;
color: #f5f0e8;
border: none;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
font-weight: 700;
cursor: pointer;
-webkit-appearance: none;
transition: background 0.15s;
}
.btn-next:active { background: #2d5a3d; }
.btn-next:disabled { opacity: 0.5; }
.btn-finish {
flex: 1;
padding: 14px;
background: #c9a84c;
color: #1a3a2a;
border: none;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
font-weight: 700;
cursor: pointer;
-webkit-appearance: none;
}
.btn-finish:active { background: #b8923e; }

/* FINISHED */
.finished-card { display: none; background: #ffffff; border-radius: 14px; padding: 28px 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.finished-card.visible { display: block; }
.finished-icon { font-size: 42px; margin-bottom: 10px; }
.finished-name { font-size: 22px; font-weight: 800; color: #1a3a2a; margin-bottom: 5px; }
.finished-score { font-size: 16px; margin-bottom: 20px; }
.finished-holes { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-bottom: 22px; }
.fh { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.fh-num { font-size: 10px; color: #bbb; }
.fh-score { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }

/* ADMIN */
.admin-lock-card { background: #ffffff; border-radius: 14px; padding: 32px 22px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.admin-lock-card h3 { font-size: 20px; font-weight: 700; color: #1a3a2a; margin-bottom: 6px; }
.admin-lock-card p { font-size: 14px; color: #888; margin-bottom: 20px; }
.pw-input {
width: 100%;
padding: 13px 14px;
border: 2px solid #e8e0d0;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 16px;
text-align: center;
letter-spacing: 0.12em;
outline: none;
background: #f5f0e8;
color: #1a3a2a;
-webkit-appearance: none;
margin-bottom: 6px;
}
.pw-input:focus { border-color: #3d7a52; }
.pw-input.error { border-color: #c0392b; }
.pw-error { color: #c0392b; font-size: 13px; min-height: 18px; margin-bottom: 14px; }

.admin-panel { display: flex; flex-direction: column; gap: 14px; }
.admin-card { background: #ffffff; border-radius: 14px; padding: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.admin-card h3 { font-size: 16px; font-weight: 700; color: #1a3a2a; margin-bottom: 14px; }
.field-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; font-weight: 600; margin-bottom: 5px; margin-top: 12px; }
.field-label:first-of-type { margin-top: 0; }
.admin-select {
width: 100%;
padding: 11px 12px;
border: 2px solid #e8e0d0;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
background: #f5f0e8;
color: #1a3a2a;
outline: none;
-webkit-appearance: none;
}
.admin-select:focus { border-color: #3d7a52; }

.active-round-box {
background: #f5f0e8;
border-radius: 10px;
padding: 12px 14px;
margin-bottom: 14px;
}
.arb-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 4px; }
.arb-val { font-size: 16px; font-weight: 700; color: #1a3a2a; }
.arb-date { font-size: 12px; color: #888; margin-top: 2px; }

.btn-full {
width: 100%;
margin-top: 14px;
padding: 14px;
background: #1a3a2a;
color: #f5f0e8;
border: none;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
font-weight: 700;
cursor: pointer;
-webkit-appearance: none;
}
.btn-full:active { background: #2d5a3d; }

.btn-danger-full {
width: 100%;
margin-top: 10px;
padding: 13px;
background: transparent;
color: #c0392b;
border: 2px solid #c0392b;
border-radius: 10px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Helvetica, Arial, sans-serif;
font-size: 15px;
font-weight: 700;
cursor: pointer;
-webkit-appearance: none;
}
.btn-danger-full:active { background: #c0392b; color: #fff; }
.btn-danger-full:disabled { opacity: 0.3; }

.admin-msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
.admin-msg.ok  { color: #27ae60; }
.admin-msg.err { color: #c0392b; }

/* TOAST */
.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: #1a3a2a;
color: #f5f0e8;
font-size: 13px;
font-weight: 600;
padding: 10px 22px;
border-radius: 22px;
z-index: 500;
transition: transform 0.3s ease;
white-space: nowrap;
box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.toast.show { transform: translateX(-50%) translateY(0); }

.empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
.empty-state .ei { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.5; }

.scoreboard-wrap::-webkit-scrollbar { height: 4px; }
.scoreboard-wrap::-webkit-scrollbar-thumb { background: #3d7a52; border-radius: 2px; }
</style>

</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">RCC <span>Golf</span></div>
  <div class="loading-sub">Boulder Pointe</div>
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<div id="appHeader">
  <div class="header-top">
    <div class="league-name">RCC <span>Golf</span> League</div>
    <div class="round-badge" id="roundBadge">Loading...</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('scoreboard')">⛳ Scoreboard</button>
    <button class="tab-btn" onclick="switchTab('entry')">✏️ Enter Scores</button>
    <button class="tab-btn" onclick="switchTab('admin')">⚙️ Admin</button>
  </div>
</div>

<div class="main">
  <div class="view active" id="view-scoreboard"><div id="scoreboardContent"></div></div>
  <div class="view" id="view-entry"><div id="entryContent"></div></div>
  <div class="view" id="view-admin"><div id="adminContent"></div></div>
</div>

<script>
const SUPABASE_URL = 'https://vtnxjheizurqardgreeq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0bnhqaGVpenVycWFyZGdyZWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzA2MTIsImV4cCI6MjA5MzY0NjYxMn0.0tEGcXoVMZme75ryvYUjBg37r_9rsV0lLmULqm7c32w';
const ADMIN_PW = 'Accountant';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let activeSeason = null;
let activeRound  = null;
let activeCourse = null;
let players      = [];
let scoreMap     = {};
let adminUnlocked = false;
let entryPlayer   = null;
let entryHole     = 0;
let entryScores   = [];
let currentStrokes = 0;
let saving = false;

const pars = () => activeCourse ? activeCourse.pars : [];
const totalPar = () => pars().reduce((a,b) => a+b, 0);

function vtpLabel(d) { return d===0?'E':d>0?'+'+d:String(d); }
function vtpClass(d) { return d<0?'under':d===0?'even':'over'; }

function fmtDate(s) {
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function init() {
  try {
    const { data: seasons } = await sb.from('seasons').select('*').eq('active', true).limit(1);
    activeSeason = seasons?.[0] || null;

    const { data: pl } = await sb.from('players').select('*').eq('active', true).order('name');
    players = pl || [];

    if (activeSeason) {
      const { data: rounds } = await sb.from('rounds')
        .select('*, courses(*)')
        .eq('season_id', activeSeason.id)
        .eq('status', 'active')
        .limit(1);
      if (rounds?.[0]) {
        activeRound  = rounds[0];
        activeCourse = rounds[0].courses;
        await loadScores();
      }
    }

    subscribeRealtime();
    updateBadge();
    renderAll();
  } catch(e) {
    console.error('Init error:', e);
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

async function loadScores() {
  if (!activeRound) { scoreMap = {}; return; }
  const { data } = await sb.from('scores').select('*').eq('round_id', activeRound.id);
  scoreMap = {};
  (data||[]).forEach(s => {
    if (!scoreMap[s.player_id]) scoreMap[s.player_id] = {};
    scoreMap[s.player_id][s.hole] = s.strokes;
  });
}

function subscribeRealtime() {
  sb.channel('rcc-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'scores' }, async () => {
      await loadScores();
      renderScoreboard();
      if (!entryPlayer) renderEntry();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'rounds' }, async () => {
      await reloadRound();
    })
    .subscribe();
}

async function reloadRound() {
  if (!activeSeason) return;
  const { data: rounds } = await sb.from('rounds')
    .select('*, courses(*)')
    .eq('season_id', activeSeason.id)
    .eq('status', 'active')
    .limit(1);
  if (rounds?.[0]) {
    activeRound  = rounds[0];
    activeCourse = rounds[0].courses;
    await loadScores();
  } else {
    activeRound = null; activeCourse = null; scoreMap = {};
  }
  updateBadge();
  renderAll();
}

function updateBadge() {
  const b = document.getElementById('roundBadge');
  if (activeRound) { b.textContent = 'Live'; b.className = 'round-badge live'; }
  else { b.textContent = 'No Round'; b.className = 'round-badge no-round'; }
}

function renderAll() { renderScoreboard(); renderEntry(); renderAdmin(); }

// ── SCOREBOARD ────────────────────────────────────────────────────────────────
function renderScoreboard() {
  const el = document.getElementById('scoreboardContent');
  if (!activeRound || !activeCourse) {
    el.innerHTML = `<div class="no-round-card"><div class="icon">⛳</div><h3>No Active Round</h3><p>Head to the Admin tab to start this week's round.</p></div>`;
    return;
  }

  const withScores = players.filter(p => scoreMap[p.id] && Object.keys(scoreMap[p.id]).length > 0);

  const rows = withScores.map(p => {
    const holes = scoreMap[p.id] || {};
    const arr   = pars().map((_,i) => holes[i+1] ?? null);
    const played = arr.filter(s => s!==null);
    const strokes = played.reduce((a,b)=>a+b,0);
    const parPlayed = pars().slice(0,played.length).reduce((a,b)=>a+b,0);
    const diff = played.length>0 ? strokes-parPlayed : null;
    return { p, arr, played, strokes, diff };
  }).sort((a,b) => {
    if (a.diff===null && b.diff===null) return 0;
    if (a.diff===null) return 1;
    if (b.diff===null) return -1;
    if (a.diff!==b.diff) return a.diff-b.diff;
    return b.played.length - a.played.length;
  });

  let parCells = `<tr class="par-row"><td class="name-col">Par</td>`;
  pars().forEach(p => parCells += `<td>${p}</td>`);
  parCells += `<td>${totalPar()}</td><td>—</td></tr>`;

  let body = '';
  if (rows.length === 0) {
    body = `<tr><td colspan="12"><div class="empty-state"><div class="ei">⛳</div><p>No scores yet.</p></div></td></tr>`;
  } else {
    rows.forEach((row, i) => {
      const hp = row.played.length;
      const statusTxt = hp===9 ? 'F' : hp>0 ? `Thru ${hp}` : '—';
      const statusCls = hp===9 ? 'done' : hp>0 ? 'active' : '';
      let cells = '';
      for (let h=0; h<9; h++) {
        const s = row.arr[h];
        if (s===null) cells += `<td><span class="hs hs-empty">·</span></td>`;
        else {
          const d = s - pars()[h];
          cells += `<td><span class="hs hs-${vtpClass(d)}">${s}</span></td>`;
        }
      }
      const tot  = hp>0 ? row.strokes : '—';
      const diff = row.diff!==null ? vtpLabel(row.diff) : '—';
      const dc   = row.diff!==null ? `tot-${vtpClass(row.diff)}` : '';
      body += `<tr class="player-row">
        <td class="name-col">
          <div><span class="pos">${i+1}</span><span class="p-name">${row.p.name}</span></div>
          <div class="p-status ${statusCls}">${statusTxt}</div>
        </td>
        ${cells}
        <td class="tot">${tot}</td>
        <td class="tot ${dc}">${diff}</td>
      </tr>`;
    });
  }

  el.innerHTML = `
    <div class="round-info">
      <div>
        <div class="round-course">Boulder Pointe — ${activeCourse.name}</div>
        <div class="round-date">${fmtDate(activeRound.date)}</div>
      </div>
      <div>
        <div class="round-players-num">${withScores.length}</div>
        <div class="round-players-lbl">Playing</div>
      </div>
    </div>
    <div class="scoreboard-wrap">
      <table class="scoreboard-table">
        <thead><tr>
          <th class="name-col">#&nbsp; Player</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
          <th>6</th><th>7</th><th>8</th><th>9</th>
          <th>TOT</th><th>+/-</th>
        </tr></thead>
        <tbody>${parCells}</tbody>
        <tbody>${body}</tbody>
      </table>
    </div>`;
}

// ── ENTRY ─────────────────────────────────────────────────────────────────────
function renderEntry() {
  const el = document.getElementById('entryContent');
  if (!activeRound || !activeCourse) {
    el.innerHTML = `<div class="no-round-card"><div class="icon">✏️</div><h3>No Active Round</h3><p>An admin needs to start this week's round first.</p></div>`;
    return;
  }
  if (entryPlayer) return;

  let btns = '';
  players.forEach(p => {
    const has = scoreMap[p.id] && Object.keys(scoreMap[p.id]).length>0;
    btns += `<button class="player-btn ${has?'has-scores':''}" onclick="selectPlayer('${p.id}')">${p.name}</button>`;
  });

  el.innerHTML = `
    <div class="card" id="playerSelectCard">
      <div class="section-label">Select Your Name</div>
      <div class="player-grid">${btns}</div>
    </div>
    <div class="change-bar" id="changeBar">
      <div><div class="change-bar-lbl">Entering scores for</div><div class="change-bar-name" id="changeBarName"></div></div>
      <button class="change-link" onclick="resetEntry()">← Change</button>
    </div>
    <div class="hole-card" id="holeCard">
      <div class="hole-header">
        <div><div class="hole-label">Hole</div><div class="hole-num" id="holeNum">1</div></div>
        <div class="par-badge" id="parBadge">Par 4</div>
      </div>
      <div class="hole-dots" id="holeDots"></div>
      <div class="strokes-row">
        <button class="stroke-btn" onclick="adj(-1)">−</button>
        <div class="stroke-val" id="strokeVal">4</div>
        <button class="stroke-btn" onclick="adj(1)">+</button>
      </div>
      <div class="stroke-label" id="strokeLabel"></div>
      <div class="running-bar">
        <div class="run-item"><div class="run-val" id="runStrokes">—</div><div class="run-lbl">Strokes</div></div>
        <div class="run-item"><div class="run-val" id="runVsPar" style="color:#27ae60">E</div><div class="run-lbl">vs Par</div></div>
        <div class="run-item"><div class="run-val" id="runHoles">0/9</div><div class="run-lbl">Holes</div></div>
      </div>
      <div class="action-row" id="actionRow"></div>
    </div>
    <div class="finished-card" id="finishedCard">
      <div class="finished-icon">🏌️</div>
      <div class="finished-name" id="finName"></div>
      <div class="finished-score" id="finScore"></div>
      <div class="finished-holes" id="finHoles"></div>
      <button class="btn-full" onclick="resetEntry()">Enter Scores for Another Player</button>
    </div>`;
}

function selectPlayer(id) {
  entryPlayer = players.find(p => p.id===id);
  if (!entryPlayer) return;
  const holes = scoreMap[entryPlayer.id] || {};
  entryScores = pars().map((_,i) => holes[i+1] ?? null);
  entryHole = entryScores.findIndex(s => s===null);
  if (entryHole===-1) entryHole = 8;
  currentStrokes = entryScores[entryHole] ?? pars()[entryHole];

  document.getElementById('playerSelectCard').style.display = 'none';
  const cb = document.getElementById('changeBar');
  cb.classList.add('visible');
  document.getElementById('changeBarName').textContent = entryPlayer.name;
  document.getElementById('holeCard').classList.add('visible');
  renderHole();
}

function renderHole() {
  if (!document.getElementById('holeNum')) return;
  const par = pars()[entryHole];
  document.getElementById('holeNum').textContent = entryHole+1;
  document.getElementById('parBadge').textContent = `Par ${par}`;
  document.getElementById('strokeVal').textContent = currentStrokes;

  // dots
  let dots = '';
  for (let i=0;i<9;i++) {
    let cls = 'dot';
    if (i===entryHole) cls += ' current';
    else if (entryScores[i]!==null) cls += entryScores[i]-pars()[i]<0 ? ' under' : ' done';
    dots += `<div class="${cls}"></div>`;
  }
  document.getElementById('holeDots').innerHTML = dots;

  // label
  const d = currentStrokes - par;
  const lbl = document.getElementById('strokeLabel');
  if (d===0) { lbl.textContent='Even par'; lbl.className='stroke-label even'; }
  else if (d<0) {
    const names=['','Birdie','Eagle','Albatross'];
    lbl.textContent = names[Math.abs(d)] || `${Math.abs(d)} under`;
    lbl.className='stroke-label under';
  } else {
    const names=['','Bogey','Double Bogey','Triple Bogey'];
    lbl.textContent = names[d] || `+${d}`;
    lbl.className='stroke-label over';
  }

  // running
  const played = entryScores.filter(s=>s!==null);
  const tot = played.reduce((a,b)=>a+b,0);
  const pp  = pars().slice(0,played.length).reduce((a,b)=>a+b,0);
  const rd  = played.length>0 ? tot-pp : 0;
  document.getElementById('runStrokes').textContent = played.length>0 ? tot : '—';
  const rvp = document.getElementById('runVsPar');
  rvp.textContent = played.length>0 ? vtpLabel(rd) : 'E';
  rvp.style.color = rd<0?'#c0392b':rd===0?'#27ae60':'#1a1a1a';
  document.getElementById('runHoles').textContent = `${played.length}/9`;

  // actions
  const ar = document.getElementById('actionRow');
  const backDis = entryHole===0 ? 'disabled' : '';
  if (entryHole===8) {
    ar.innerHTML = `<button class="btn-back" onclick="prevHole()" ${backDis}>← Back</button><button class="btn-finish" onclick="finishRound()">Finish Round ✓</button>`;
  } else {
    ar.innerHTML = `<button class="btn-back" onclick="prevHole()" ${backDis}>← Back</button><button class="btn-next" id="btnNext" onclick="saveHole()">Save & Next →</button>`;
  }
}

function adj(delta) {
  currentStrokes = Math.max(1, currentStrokes+delta);
  renderHole();
}

async function saveHole() {
  if (saving) return;
  saving = true;
  const btn = document.getElementById('btnNext');
  if (btn) btn.disabled = true;
  entryScores[entryHole] = currentStrokes;
  await upsert(entryHole+1, currentStrokes);
  entryHole++;
  currentStrokes = entryScores[entryHole] ?? pars()[entryHole];
  saving = false;
  renderHole();
}

function prevHole() {
  if (entryHole===0) return;
  entryScores[entryHole] = currentStrokes;
  entryHole--;
  currentStrokes = entryScores[entryHole] ?? pars()[entryHole];
  renderHole();
}

async function finishRound() {
  entryScores[entryHole] = currentStrokes;
  await upsert(entryHole+1, currentStrokes);
  const tot  = entryScores.reduce((a,b)=>(a||0)+(b||0),0);
  const diff = tot - totalPar();

  document.getElementById('finName').textContent = entryPlayer.name;
  const fs = document.getElementById('finScore');
  fs.textContent = `${tot} strokes — ${vtpLabel(diff)} par`;
  fs.style.color = diff<0?'#c0392b':diff===0?'#27ae60':'#1a1a1a';

  const fh = document.getElementById('finHoles');
  fh.innerHTML = '';
  entryScores.forEach((s,i) => {
    const d  = s - pars()[i];
    const bg = d<0?'rgba(192,57,43,0.12)':d===0?'rgba(39,174,96,0.12)':'rgba(0,0,0,0.06)';
    const co = d<0?'#c0392b':d===0?'#27ae60':'#1a1a1a';
    fh.innerHTML += `<div class="fh"><div class="fh-num">${i+1}</div><div class="fh-score" style="background:${bg};color:${co}">${s}</div></div>`;
  });

  document.getElementById('holeCard').classList.remove('visible');
  document.getElementById('finishedCard').classList.add('visible');
  toast('Round saved! 🏌️');
}

async function upsert(hole, strokes) {
  if (!activeRound || !entryPlayer) return;
  await sb.from('scores').upsert(
    { round_id: activeRound.id, player_id: entryPlayer.id, hole, strokes },
    { onConflict: 'round_id,player_id,hole' }
  );
}

function resetEntry() {
  entryPlayer = null; entryHole = 0; entryScores = []; currentStrokes = 0;
  renderEntry();
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin() {
  const el = document.getElementById('adminContent');
  if (!adminUnlocked) {
    el.innerHTML = `
      <div class="admin-lock-card">
        <h3>Admin Access</h3>
        <p>Enter the admin password to continue.</p>
        <input class="pw-input" id="pwInput" type="password" placeholder="Password"
          onkeydown="if(event.key==='Enter')checkPw()">
        <div class="pw-error" id="pwError"></div>
        <button class="btn-full" onclick="checkPw()">Unlock</button>
      </div>`;
    return;
  }
  el.innerHTML = `<div class="admin-panel" id="adminPanel"><div style="text-align:center;padding:20px;font-size:13px;color:#aaa;">Loading...</div></div>`;
  loadAdminPanel();
}

async function loadAdminPanel() {
  const { data: courses } = await sb.from('courses').select('*').order('name');
  const panel = document.getElementById('adminPanel');
  if (!panel) return;
  const opts = (courses||[]).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  const today = new Date().toISOString().slice(0,10);

  const activeBox = activeRound
    ? `<div class="active-round-box"><div class="arb-label">Current Active Round</div><div class="arb-val">Boulder Pointe — ${activeCourse.name}</div><div class="arb-date">${fmtDate(activeRound.date)}</div></div>`
    : `<div class="active-round-box" style="opacity:0.5"><div class="arb-label">No Active Round</div></div>`;

  panel.innerHTML = `
    <div class="admin-card">
      <h3>Start New Round</h3>
      <label class="field-label">Course</label>
      <select class="admin-select" id="adminCourse">${opts}</select>
      <label class="field-label">Date</label>
      <input type="date" class="admin-select" id="adminDate" value="${today}">
      <button class="btn-full" onclick="startRound()">Start Round</button>
      <div class="admin-msg" id="startMsg"></div>
    </div>
    <div class="admin-card">
      <h3>Active Round</h3>
      ${activeBox}
      <button class="btn-danger-full" onclick="closeRound()" ${!activeRound?'disabled':''}>Close Active Round</button>
      <div class="admin-msg" id="closeMsg"></div>
    </div>`;
}

function checkPw() {
  const input = document.getElementById('pwInput');
  const err   = document.getElementById('pwError');
  if (input.value === ADMIN_PW) {
    adminUnlocked = true;
    renderAdmin();
  } else {
    input.classList.add('error');
    err.textContent = 'Incorrect password.';
    setTimeout(() => { input.classList.remove('error'); err.textContent=''; }, 2000);
  }
}

async function startRound() {
  const courseId = document.getElementById('adminCourse').value;
  const date     = document.getElementById('adminDate').value;
  const msg      = document.getElementById('startMsg');
  if (!courseId || !date) { msg.textContent='Pick a course and date.'; msg.className='admin-msg err'; return; }
  if (activeRound) await sb.from('rounds').update({ status:'closed' }).eq('id', activeRound.id);
  const { error } = await sb.from('rounds').insert({ season_id: activeSeason.id, course_id: courseId, date, status:'active' });
  if (error) { msg.textContent='Error starting round.'; msg.className='admin-msg err'; }
  else { msg.textContent='Round started!'; msg.className='admin-msg ok'; await reloadRound(); loadAdminPanel(); toast('Round started ⛳'); }
}

async function closeRound() {
  if (!activeRound) return;
  const msg = document.getElementById('closeMsg');
  const { error } = await sb.from('rounds').update({ status:'closed' }).eq('id', activeRound.id);
  if (error) { msg.textContent='Error closing round.'; msg.className='admin-msg err'; }
  else { msg.textContent='Round closed.'; msg.className='admin-msg ok'; await reloadRound(); loadAdminPanel(); toast('Round closed.'); }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  const tabs = ['scoreboard','entry','admin'];
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', tabs[i]===tab));
  tabs.forEach(v => document.getElementById(`view-${v}`).classList.toggle('active', v===tab));
}

init();
</script>
